      div.innerHTML = `<b>Arena — active (${features.length})</b><br/>` +
        `<span class="swatch" style="background:${SRC_COLORS.osm}"></span>OSM polygon (${counts.osm})<br/>` +
        `<span class="swatch" style="background:${SRC_COLORS.poi}"></span>POI point (${counts.poi})`;
      return div;
    };
    legend.addTo(map);

    // Fit to data
    const all = features.filter(f => f.lat != null && f.lon != null);
    if (all.length) {
      const lats = all.map(f => f.lat), lons = all.map(f => f.lon);
      map.fitBounds([[Math.min(...lats), Math.min(...lons)], [Math.max(...lats), Math.max(...lons)]]);
    }
  })();
</script>
</body>
</html>
