<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CA Operators · Management Mosaic</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html,body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  #map { width:100%; height:100vh; }
  .panel {
    position:absolute; top:12px; left:12px; z-index:1000;
    background:#fff; border:1px solid #d1dde8; border-radius:6px;
    padding:10px 14px; box-shadow:0 2px 8px rgba(0,0,0,.08);
    max-width:300px; font-size:13px; line-height:1.4;
  }
  .panel h1 { margin:0 0 6px 0; font-size:15px; font-weight:600; }
  .panel .muted { color:#647688; font-size:12px; }
  .legend { margin-top:10px; }
  .legend .row {
    display:flex; align-items:center; gap:8px; padding:3px 0;
    cursor:pointer;
  }
  .legend .row.muted-row { opacity:0.35; }
  .legend .swatch {
    width:14px; height:14px; border-radius:3px;
    border:1px solid rgba(0,0,0,.15); flex-shrink:0;
  }
  .legend .name { flex:1; text-transform:capitalize; }
  .legend .meta { color:#647688; font-size:11px; flex-shrink:0; }
  .leaflet-popup-content { font-size:13px; line-height:1.5; }
  .leaflet-popup-content strong { display:block; margin-bottom:4px; }
  #status { margin-top:6px; font-size:11px; color:#647688; }
</style>
</head>
<body>

<div class="panel">
  <h1>CA management mosaic</h1>
  <div class="muted">Polygons colored by operator level. Click a legend row to toggle. Click a polygon for details.</div>
  <div class="legend" id="legend">loading…</div>
  <div id="status"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPABASE_URL = 'https://ehlzbwtrsxaaukurekau.supabase.co';
const ANON_KEY     = 'sb_publishable_lAg7YdZ3w7S5fN8jgiExKQ_3-KtW3xk';

// One color per authority level. Renders deepest-control on top:
// federal → state → tribal → county → city → district → private.
const LEVEL_COLOR = {
  'federal':          '#8c564b',  // brown
  'state':            '#2ca02c',  // green
  'tribal':           '#9467bd',  // purple
  'county':           '#ff7f0e',  // orange
  'city':             '#1f77b4',  // blue
  'special-district': '#17becf',  // cyan
  'private':          '#e377c2',  // pink
  'joint':            '#7f7f7f',  // gray
  'unknown':          '#bcbd22',  // olive
};
// Render order — bottom of array drawn last (on top)
const LEVEL_ORDER = ['federal','state','tribal','county','city','special-district','joint','unknown','private'];

const map = L.map('map', { preferCanvas: true }).setView([37.3, -119.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap France · CPAD via GreenInfo Network · TIGER Places/Counties',
}).addTo(map);

const layersByLevel = {};   // level → L.featureGroup
const countByLevel  = {};   // level → ops count
const areaByLevel   = {};   // level → sum km2

async function load() {
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/operator_polygons_cache?select=operator_id,slug,canonical_name,level,subtype,poly_count,area_km2,geojson`,
    {
      headers: {
        apikey: ANON_KEY,
        Authorization: `Bearer ${ANON_KEY}`,
        Accept: 'application/json',
        // PostgREST default cap is 1000. Tell it to return everything.
        'Prefer': 'count=exact',
        'Range': '0-9999',
      },
    }
  );
  if (!r.ok) {
    document.getElementById('status').textContent = `error: ${r.status} ${r.statusText}`;
    return;
  }
  const rows = await r.json();

  // Group by level so we can stack them in a deterministic z-order
  const byLevel = {};
  for (const row of rows) {
    const lvl = row.level || 'unknown';
    (byLevel[lvl] = byLevel[lvl] || []).push(row);
    countByLevel[lvl] = (countByLevel[lvl] || 0) + 1;
    areaByLevel[lvl]  = (areaByLevel[lvl]  || 0) + Number(row.area_km2 || 0);
  }

  for (const lvl of LEVEL_ORDER) {
    const list = byLevel[lvl];
    if (!list) continue;
    const color = LEVEL_COLOR[lvl] || '#999';
    const group = L.featureGroup();
    for (const row of list) {
      L.geoJSON(row.geojson, {
        style: { color, weight: 0.6, fillColor: color, fillOpacity: 0.4 },
        onEachFeature: (_, lyr) => {
          lyr.bindPopup(`
            <strong>${row.canonical_name}</strong>
            ${row.level}${row.subtype ? ' · ' + row.subtype : ''}<br>
            ${row.poly_count.toLocaleString()} polygons${row.area_km2 ? ` · ${Number(row.area_km2).toLocaleString()} km²` : ''}<br>
            <span style="color:#647688;font-size:11px">slug: ${row.slug}</span>
          `);
        },
      }).addTo(group);
    }
    group.addTo(map);
    layersByLevel[lvl] = group;
  }

  // Build legend
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  for (const lvl of LEVEL_ORDER) {
    if (!countByLevel[lvl]) continue;
    const color = LEVEL_COLOR[lvl];
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <span class="swatch" style="background:${color}"></span>
      <span class="name">${lvl}</span>
      <span class="meta">${countByLevel[lvl]} · ${Math.round(areaByLevel[lvl]).toLocaleString()} km²</span>
    `;
    row.addEventListener('click', () => {
      const layer = layersByLevel[lvl];
      if (map.hasLayer(layer)) { map.removeLayer(layer); row.classList.add('muted-row'); }
      else                     { layer.addTo(map);       row.classList.remove('muted-row'); }
    });
    legend.appendChild(row);
  }

  document.getElementById('status').textContent =
    `${rows.length.toLocaleString()} operators rendered`;
}

load();
</script>
</body>
</html>
