<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>POI Spot-check — name-quality rows</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0b1020;
    --panel: #131a2e;
    --panel-2: #1b2340;
    --border: #2a3658;
    --text: #e6ecff;
    --muted: #9aa5c8;
    --accent: #4ade80;
    --accent-2: #38bdf8;
    --warn: #f59e0b;
    --bad: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 5;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .stats { color: var(--muted); font-size: 13px; }
  header .spacer { flex: 1; }
  header button {
    background: var(--accent);
    color: #062012;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  header button:disabled { opacity: 0.4; cursor: not-allowed; }
  header button.secondary {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
  }
  main { padding: 16px 20px 80px; max-width: 1100px; margin: 0 auto; }
  .grid { display: grid; gap: 12px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .card.toggled-inactive {
    background: #2a1a1a;
    border-color: var(--bad);
  }
  .card .name { font-size: 17px; font-weight: 600; }
  .card .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .card .meta .pill {
    display: inline-block;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 8px;
    margin-right: 6px;
    font-size: 12px;
  }
  .card .links { font-size: 12px; margin-top: 6px; }
  .card .links a {
    color: var(--accent-2);
    text-decoration: none;
    margin-right: 12px;
  }
  .card .links a:hover { text-decoration: underline; }
  .card .actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .toggle {
    background: var(--accent);
    color: #062012;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    min-width: 130px;
  }
  .toggle.inactive { background: var(--bad); color: #fff; }
  .reason-input {
    margin-top: 4px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 12px;
    width: 130px;
    display: none;
  }
  .card.toggled-inactive .reason-input { display: block; }

  /* Save modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    max-width: 700px;
    width: 100%;
    max-height: 80vh;
    display: flex; flex-direction: column;
  }
  .modal h2 { margin: 0 0 8px; font-size: 16px; }
  .modal p { margin: 0 0 10px; color: var(--muted); font-size: 13px; }
  .modal textarea {
    flex: 1;
    min-height: 240px;
    background: #0a0f1f;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    resize: vertical;
  }
  .modal .row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .modal button {
    background: var(--accent-2);
    color: #062430;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .modal button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #062012;
    padding: 10px 18px; border-radius: 6px; font-weight: 600; font-size: 13px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 200;
  }
  .toast.show { opacity: 1; }
</style>
</head>

<header>

  <span class="stats" id="stats">— rows loaded</span>
  <span class="spacer"></span>
  <button class="secondary" onclick="resetAll()">Reset</button>

</header>

<main>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">

    <div class="row">

</div>

// ── State ─────────────────────────────────────────────────────────────────
// fid → { active: bool, reason: string }
const state = {};
for (const r of ROWS) state[r.fid] = { active: true, reason: 'not_a_beach' };

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (const r of ROWS) {
    const s = state[r.fid];
    const card = document.createElement('div');
    card.className = 'card' + (s.active ? '' : ' toggled-inactive');
    card.id = `card-${r.fid}`;

    const left = document.createElement('div');
    left.innerHTML = `
      <div class="name">${escapeHtml(r.display_name || r.name)}</div>
      <div class="meta">
        <span class="pill">${escapeHtml(r.county)}</span>
        <span class="pill">${escapeHtml(r.addr_source)}</span>
        <span>${escapeHtml(r.address)}</span>
      </div>
      <div class="links">
        <a href="https://www.google.com/maps/place/${r.lat},${r.lon}/@${r.lat},${r.lon},18z" target="_blank" rel="noopener">Google Maps</a>
        <a href="https://www.google.com/maps/@${r.lat},${r.lon},90m/data=!3m1!1e3" target="_blank" rel="noopener">Satellite</a>
        <span style="color:var(--muted)">${r.lat.toFixed(5)}, ${r.lon.toFixed(5)}</span>
      </div>
    `;

    const right = document.createElement('div');
    right.className = 'actions';
    const btn = document.createElement('button');
    btn.className = 'toggle' + (s.active ? '' : ' inactive');
    btn.textContent = s.active ? 'ACTIVE — keep' : 'INACTIVE — drop';
    btn.onclick = () => toggle(r.fid);
    const reasonInput = document.createElement('input');
    reasonInput.className = 'reason-input';
    reasonInput.value = s.reason;
    reasonInput.placeholder = 'reason';
    reasonInput.oninput = (e) => { state[r.fid].reason = e.target.value; updateSaveBtn(); };
    right.appendChild(btn);
    right.appendChild(reasonInput);

    card.appendChild(left);
    card.appendChild(right);
    grid.appendChild(card);
  }
  document.getElementById('stats').textContent = `${ROWS.length} rows loaded`;
  updateSaveBtn();
}

function toggle(fid) {
  state[fid].active = !state[fid].active;
  render();
}

function resetAll() {
  for (const fid in state) { state[fid].active = true; state[fid].reason = 'not_a_beach'; }
  render();
}

function updateSaveBtn() {
  const toggled = ROWS.filter(r => !state[r.fid].active).length;
  const btn = document.getElementById('save-btn');
  btn.textContent = `Save (${toggled})`;
  btn.disabled = toggled === 0;
}

// ── Save → SQL output ─────────────────────────────────────────────────────
function buildSql() {
  const toggled = ROWS.filter(r => !state[r.fid].active);
  if (toggled.length === 0) return '-- no rows toggled\n';
  const lines = [];
  lines.push('-- Mark spot-checked POIs as inactive.');
  lines.push('-- Generated by admin/poi-spotcheck.html');
  lines.push('-- ' + new Date().toISOString());
  lines.push('');
  lines.push('begin;');
  lines.push('');
  for (const r of toggled) {
    const reason = state[r.fid].reason.replace(/'/g, "''");
    const name = r.name.replace(/'/g, "''");
    lines.push(`-- ${name}  (${r.county})`);
    lines.push(`update public.poi_landing`);
    lines.push(`   set is_active = false,`);
    lines.push(`       inactive_reason = '${reason}'`);
    lines.push(` where fid = ${r.fid};`);
    lines.push('');
  }
  lines.push('-- Verify');
  const fids = toggled.map(r => r.fid).join(', ');
  lines.push(`select fid, name, is_active, inactive_reason`);
  lines.push(`  from public.poi_landing`);
  lines.push(` where fid in (${fids})`);
  lines.push(` order by name;`);
  lines.push('');
  lines.push('commit;');
  return lines.join('\n');
}

function openSaveModal() {
  document.getElementById('sql-out').value = buildSql();
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

async function copySql() {
  const sql = document.getElementById('sql-out').value;
  try {
    await navigator.clipboard.writeText(sql);
    showToast('Copied to clipboard');
  } catch {
    document.getElementById('sql-out').select();
    document.execCommand('copy');
    showToast('Copied');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

render();
