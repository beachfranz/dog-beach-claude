<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beach Compare — Dog Beach Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/chat.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --surface:      #181c27;
      --surface-hover:#1e2333;
      --border:       #252a3a;
      --text:         #e8eaf0;
      --text-muted:   #6b7280;
      --text-dim:     #4b5268;
      --green:        #4ade80;
      --green-dim:    #1a3a27;
      --amber:        #fbbf24;
      --amber-dim:    #3a2e10;
      --red:          #f87171;
      --red-dim:      #3a1a1a;
      --radius:       14px;
      --radius-sm:    8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 0 40px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      padding: 16px 16px 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .wordmark {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
    }

    .back-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }

    .page-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    /* ── Day selector ─────────────────────────────────────────────── */
    .day-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .day-pills::-webkit-scrollbar { display: none; }

    .day-pill {
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .day-pill:hover { border-color: #303650; color: var(--text); }
    .day-pill.active {
      background: var(--surface-hover);
      border-color: #3b5bdb;
      color: var(--text);
    }

    /* ── Beach cards ──────────────────────────────────────────────── */
    .beach-list {
      padding: 14px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .beach-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .beach-card.rank-1 { border-left: 3px solid var(--green); }
    .beach-card.rank-2 { border-left: 3px solid #a3e635; }
    .beach-card.rank-3 { border-left: 3px solid var(--amber); }
    .beach-card.rank-4 { border-left: 3px solid #fb923c; }
    .beach-card.rank-5 { border-left: 3px solid var(--red); opacity: 0.8; }

    .beach-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .beach-rank-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rank-badge {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      width: 18px;
      text-align: center;
    }

    .beach-name {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .composite-score {
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 500;
    }
    .score-no_data { color: var(--text-dim); }
    .score-go      { color: var(--green); }
    .score-caution { color: var(--amber); }
    .score-no_go   { color: var(--red); }

    .beach-window {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-left: 28px;
    }

    /* ── Component score bars ─────────────────────────────────────── */
    .component-scores {
      display: flex;
      gap: 8px;
      padding-left: 28px;
    }

    .comp-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .comp-icon { font-size: 14px; line-height: 1; }

    .comp-bar-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .comp-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .bar-green  { background: var(--green); }
    .bar-amber  { background: var(--amber); }
    .bar-red    { background: var(--red); }
    .bar-dim    { background: var(--text-dim); }

    .comp-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── No data ──────────────────────────────────────────────────── */
    .no-data {
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Skeleton ─────────────────────────────────────────────────── */
    .skeleton {
      height: 110px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-top">
      <a href="index.html" class="wordmark">
        <img src="src/avatar.png" style="width:28px;height:28px;border-radius:50%;cursor:pointer;" alt="Scout" onclick="event.preventDefault();toggleChat()" title="Ask Scout">
        Dog Beach Scout
      </a>
      <a href="index.html" class="back-link">← Back</a>
    </div>
    <div class="page-title">Compare Beaches</div>
    <div class="day-pills" id="day-pills"></div>
  </header>

  <div class="beach-list" id="beach-list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://ehlzbwtrsxaaukurekau.supabase.co';
  const ANON_KEY     = 'sb_publishable_o2d4Kg0xMZoMw92feO2uWQ_PdDfQXKj';

  // ── Build day pills ────────────────────────────────────────────────
  const today = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
  const days  = [];

  for (let i = 0; i < 7; i++) {
    const d    = new Date(today);
    d.setDate(today.getDate() + i);
    const iso  = d.toISOString().slice(0, 10);
    const label = i === 0 ? 'TDY'
                : i === 1 ? 'TMW'
                : d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
    days.push({ iso, label });
  }

  let selectedDate = days[0].iso;

  const pillsEl = document.getElementById('day-pills');
  days.forEach(({ iso, label }) => {
    const btn = document.createElement('button');
    btn.className = 'day-pill' + (iso === selectedDate ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      selectedDate = iso;
      loadCompare(iso);
    };
    pillsEl.appendChild(btn);
  });

  // ── Load compare data ──────────────────────────────────────────────
  async function loadCompare(date) {
    const list = document.getElementById('beach-list');
    list.innerHTML = Array(5).fill('<div class="skeleton"></div>').join('');

    try {
      const res  = await fetch(`${SUPABASE_URL}/functions/v1/get-beach-compare?date=${date}`,
        { headers: { 'Authorization': `Bearer ${ANON_KEY}` } });
      const data = await res.json();

      if (!data.beaches?.length) {
        list.innerHTML = '<div class="no-data">No data available for this date.</div>';
        return;
      }

      list.innerHTML = data.beaches.map((b, i) => renderCard(b, i + 1)).join('');
    } catch {
      list.innerHTML = '<div class="no-data">Failed to load data.</div>';
    }
  }

  // ── Render a beach card ────────────────────────────────────────────
  function renderCard(b, rank) {
    const hasScore = b.composite_score > 0;

    const scoreHtml = hasScore
      ? `<span class="composite-score score-${b.day_status}">${b.composite_score}</span>`
      : `<span class="composite-score score-no_data">—</span>`;

    const windowHtml = b.best_window_label
      ? `<div class="beach-window">${b.best_window_label}${b.go_hours_count ? ` · ${b.go_hours_count}h go` : ''}</div>`
      : `<div class="beach-window" style="color:var(--text-dim)">No good window</div>`;

    const components = [
      { key: 'tide_score',  icon: '🌊', label: 'Tide'    },
      { key: 'wind_score',  icon: '💨', label: 'Wind'    },
      { key: 'crowd_score', icon: '🐾', label: 'Crowd'   },
      { key: 'rain_score',  icon: '🌤',  label: 'Weather' },
      { key: 'temp_score',  icon: '🌡',  label: 'Temp'   },
    ];

    const barsHtml = hasScore ? `
      <div class="component-scores">
        ${components.map(c => {
          const val = b[c.key];
          if (val === null) return '';
          const pct   = Math.round(val * 100);
          const color = val >= 0.7 ? 'bar-green' : val >= 0.4 ? 'bar-amber' : 'bar-red';
          return `
            <div class="comp-item">
              <span class="comp-icon">${c.icon}</span>
              <div class="comp-bar-track">
                <div class="comp-bar-fill ${color}" style="width:${pct}%"></div>
              </div>
              <span class="comp-label">${c.label}</span>
            </div>`;
        }).join('')}
      </div>` : '';

    return `
      <div class="beach-card rank-${rank}">
        <div class="beach-card-top">
          <div class="beach-rank-name">
            <span class="rank-badge">${rank}</span>
            <span class="beach-name">${b.display_name}</span>
          </div>
          ${scoreHtml}
        </div>
        ${windowHtml}
        ${barsHtml}
      </div>`;
  }

  // ── Boot ───────────────────────────────────────────────────────────
  loadCompare(selectedDate);

</script>
<script>
  window.CHAT_CONFIG = {
    getLocationId: () => null,
    placeholder: 'Which beach is best this weekend?',
  };
</script>
<script src="src/chat.js"></script>
</body>
</html>
