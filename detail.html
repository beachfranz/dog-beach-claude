<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Beach Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/chat.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #eef4f8;  /* sea fog */
      --surface:      #ffffff;
      --border:       #d1dde8;  /* cool gray-blue */
      --text:         #0f2742;  /* marine navy */
      --text-muted:   #5b6b7d;
      --text-dim:     #94a3b8;
      --green:        #15803d;  /* hunter */
      --advisory:     #0369a1;  /* deep sea blue */
      --amber:        #b45309;  /* burnt orange */
      --red:          #9f1239;  /* rose burgundy */
      --blue:         #0369a1;  /* matches advisory */
      --bar-go:       #15803d;
      --bar-advisory: #0369a1;
      --bar-caution:  #b45309;
      --bar-no_go:    #9f1239;
      --bar-window:   #a8b4bc;  /* cool silver — best window */
      --radius:       14px;
      --radius-sm:    8px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 48px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 20px 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; flex-direction: column; gap: 2px; }

    .header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .window-label {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--green);
    }

    .window-label.advisory { color: var(--advisory); }
    .window-label.caution  { color: var(--amber); }
    .window-label.no_go    { color: var(--red); }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 4px;
      text-decoration: none;
    }

    .close-btn:hover { color: var(--text); background: #1e2333; }

    /* ── Charts ───────────────────────────────────────────────────── */
    .charts { display: flex; flex-direction: column; gap: 8px; width: 100%; }

    .metric-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .metric-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      position: relative;
      z-index: 1;
    }

    .bars-wrap {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 30px;
      position: relative;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }

    .bar-value {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
      line-height: 1;
    }

    .bar-dog {
      font-size: 10px;
      line-height: 1;
      min-height: 12px;
    }

    .bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      transition: opacity 0.15s;
    }

    /* x-axis labels */
    .x-axis {
      display: flex;
      gap: 3px;
      padding: 2px 0 0;
    }

    .x-label {
      flex: 1;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
    }

    /* ── Status board ────────────────────────────────────────────── */
    .board-and-charts {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 12px 16px 0;
    }

    .status-board {
      flex-shrink: 0;
      width: 116px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .sb-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .sb-metric {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    .sb-value {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      line-height: 1.3;
    }

    .sb-time {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Legend ───────────────────────────────────────────────────── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 16px 20px 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Narrative ────────────────────────────────────────────────── */
    .narrative {
      margin: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .narrative-block { display: flex; flex-direction: column; gap: 4px; }

    .narrative-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .narrative-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
    }

    .narrative-text.amber { color: var(--amber); }
    .narrative-text.red   { color: var(--red); }

    /* Product chip strip beneath the Scout blurb. Bracket aesthetic
       matches the design mock — terminal-style affordances rather
       than full pill buttons. */
    .product-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 8px;
    }
    .product-chip {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--advisory);
      text-decoration: none;
      white-space: nowrap;
    }
    .product-chip:hover { color: var(--blue); text-decoration: underline; }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    .bar-col { position: relative; }

    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      border: 1px solid #3b4560;
      border-radius: 6px;
      padding: 6px 8px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
    }

    .tooltip-hour {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #ffffff;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .tooltip-line {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #c8d0e0;
      line-height: 1.5;
    }

    .tooltip-status-go       { color: var(--green); }
    .tooltip-status-advisory { color: var(--advisory); }
    .tooltip-status-caution  { color: var(--amber); }
    .tooltip-status-no_go    { color: var(--red); }

    .bar-col:hover .tooltip { display: block; }

    /* ── Score tooltip breakdown bars ───────────────────────────── */
    .tt-breakdown { margin-top: 5px; display: flex; flex-direction: column; gap: 3px; }
    .tt-row { display: flex; align-items: center; gap: 5px; }
    /* Track is first, label sits to its right. Fill grows from the
       track's RIGHT edge (zero origin on the right) by floating it. */
    .tt-track { width: 64px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; display: flex; justify-content: flex-end; }
    .tt-fill  { height: 100%; border-radius: 3px; }
    .tt-label { font-size: 13px; line-height: 1; width: 18px; text-align: left; flex-shrink: 0; }

    /* ── Loading / error ──────────────────────────────────────────── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 12px;
    }

    .state-icon { font-size: 36px; }

    .state-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-left" id="header-left">
      <div class="header-title">
        <img src="src/avatar.png" class="scout-trigger" alt="Scout" onclick="toggleChat()" title="Ask Scout">
        <span id="day-title">Loading...</span>
      </div>
      <div class="window-label" id="window-label"></div>
    </div>
    <a class="close-btn" id="close-btn" href="index.html">✕</a>
  </header>

  <div id="main-content">
    <div class="state">
      <div class="state-icon">🐾</div>
      <div class="state-text">Loading forecast...</div>
    </div>
  </div>

</div>
<script>
  // ── Config ────────────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://ehlzbwtrsxaaukurekau.supabase.co';
  const ANON_KEY      = 'sb_publishable_lAg7YdZ3w7S5fN8jgiExKQ_3-KtW3xk';

  // ── WMO weather code helpers ──────────────────────────────────────
  const SEVERE_WMO  = new Set([63,64,65,66,67,71,72,73,74,75,76,77,82,95,96,97,98,99]);
  const CAUTION_WMO = new Set([45,48,51,53,55,56,57,61,80,81]);

  const WMO_LABELS = {
    0:'Clear', 1:'Clear', 2:'Partly Cloudy', 3:'Overcast',
    45:'Fog', 48:'Fog',
    51:'Light Drizzle', 53:'Drizzle', 55:'Heavy Drizzle',
    56:'Freezing Drizzle', 57:'Freezing Drizzle',
    61:'Light Rain', 63:'Rain', 65:'Heavy Rain',
    66:'Freezing Rain', 67:'Freezing Rain',
    80:'Light Showers', 81:'Showers', 82:'Violent Showers',
    95:'Thunderstorm', 96:'Thunderstorm', 99:'Thunderstorm',
  };

  const WMO_ICONS = {
    0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
    45:'🌫️', 48:'🌫️',
    51:'🌦️', 53:'🌦️', 55:'🌧️',
    56:'🌧️', 57:'🌧️',
    61:'🌦️', 63:'🌧️', 65:'🌧️',
    66:'🌧️', 67:'🌧️',
    80:'🌦️', 81:'🌧️', 82:'⛈️',
    95:'⛈️', 96:'⛈️', 99:'⛈️',
  };

  function wmoStatus(code) {
    if (code == null) return 'go';
    if (SEVERE_WMO.has(code))  return 'no_go';
    if (CAUTION_WMO.has(code)) return 'caution';
    return 'go';
  }

  // ── Params ────────────────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const locationId = params.get('location') ?? 'huntington-dog-beach';
  const today      = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
  const date       = params.get('date') ?? today;

  // Fix close button to preserve location
  document.getElementById('close-btn').href = `index.html?location=${locationId}`;

  loadDetail(locationId, date);

  // ── Fetch ─────────────────────────────────────────────────────────
  async function loadDetail(locationId, date) {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/get-beach-detail?location_id=${locationId}&date=${date}`,
        { headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' } }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      render(data);
    } catch (err) {
      showError(err.message);
    }
  }

  // ── Render ────────────────────────────────────────────────────────
  function render({ beach, day, hours }) {
    // Header
    const dateObj  = new Date(date + 'T12:00:00');
    const dayName  = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
    document.title = `${dayName} — ${beach.display_name}`;
    document.getElementById('day-title').textContent = `${beach.display_name} — ${dayName}`;

    const winLabel = document.getElementById('window-label');
    if (day.best_window_label) {
      winLabel.textContent = day.best_window_label;
      winLabel.className = `window-label ${day.best_window_status ?? ''}`;
    }
    // Scout blurb — loads async, shows shimmer until ready
    const blurbEl = document.createElement('div');
    blurbEl.id = 'scout-blurb';
    blurbEl.style.cssText = "font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;color:var(--text-muted);margin-top:6px;opacity:0.4;cursor:pointer;";
    blurbEl.title = 'Ask Scout';
    blurbEl.onclick = toggleChat;
    blurbEl.textContent = 'Getting Scout\'s take…';
    document.getElementById('header-left').appendChild(blurbEl);

    // Product chip strip directly beneath the scout blurb. Replace
    // mode: chip set is conditional on the day's actual data, with the
    // bowl as the only universal essential.
    const chipStrip = document.createElement('div');
    chipStrip.className = 'product-chips';
    chipStrip.innerHTML = buildChipStripHtml(day, hours);
    document.getElementById('header-left').appendChild(chipStrip);

    loadScoutBlurb(locationId, date, day, hours);

    if (hours.length === 0) {
      showError('No hourly data available for this date.');
      return;
    }

    // All possible metric definitions (Score and Temp handled separately)
    const scoreMetric = {
      label:    'Score',
      key:      'hour_score',
      fmt:      v => v !== null ? Math.round(Number(v)) : '',
      max:      () => 100,
      parse:    v => v !== null ? Number(v) : null,
      reasonFn: h => h.is_in_best_window ? 'Best window of the day'
        : h.hour_status === 'no_go'    ? 'Not recommended'
        : h.hour_status === 'caution'  ? 'Some concerns this hour'
        : h.hour_status === 'advisory' ? 'Minor advisory'
        : 'Looks good',
    };

    const tempMetric = {
      label:     'Temp (°F)',
      key:       'temp_air',
      statusKey: 'temp_status',
      scoreKey:  'temp_score',
      fmt:       v => v !== null ? Math.round(v) : '',
      max:       () => Math.max(...hours.map(x => x.temp_air ?? 0), 1),
      relative:  true,
      reasonFn:  h => h.temp_status === 'no_go'    ? 'Extreme temperature'
        : h.temp_status === 'caution'  ? 'Temp outside comfort zone'
        : h.temp_status === 'advisory' ? 'Slightly warm or cool'
        : 'Comfortable temperature',
    };

    const weatherMetric = {
      label:        'Weather',
      key:          'weather_score',
      fmt:          () => '',
      max:          () => 1,
      barMaxHeight: 22,
      wrapStyle:    'height:40px',
      barIconFn:    h => WMO_ICONS[h.weather_code] ?? '🌡️',
      statusFn:     h => wmoStatus(h.weather_code),
      colorFn:      h => {
        const s = wmoStatus(h.weather_code);
        return s === 'no_go' ? 'var(--bar-no_go)' : s === 'caution' ? 'var(--bar-caution)' : 'var(--bar-go)';
      },
      reasonFn:     h => WMO_LABELS[h.weather_code] ?? 'Unknown',
    };

    const candidateMetrics = [
      {
        label:     'Tide (ft)',
        key:       'tide_height',
        statusKey: 'tide_status',
        scoreKey:  'tide_score',
        fmt:       v => v !== null ? v.toFixed(1) : '',
        max:       () => Math.max(...hours.map(x => x.tide_height ?? 0), 0.1),
        reasonFn:  h => h.tide_status === 'no_go'    ? 'Dangerously high tide'
          : h.tide_status === 'caution'  ? 'High tide — less beach'
          : h.tide_status === 'advisory' ? 'Tide rising'
          : 'Good tide level',
      },
      {
        label:     'Wind (mph)',
        key:       'wind_speed',
        statusKey: 'wind_status',
        scoreKey:  'wind_score',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       () => Math.max(...hours.map(x => x.wind_speed ?? 0), 1),
        reasonFn:  h => h.wind_status === 'no_go'    ? 'Dangerous wind speed'
          : h.wind_status === 'caution'  ? 'Strong wind'
          : h.wind_status === 'advisory' ? 'Breezy'
          : 'Calm wind',
      },
      {
        label:     'Rain (%)',
        key:       'precip_chance',
        statusKey: 'rain_status',
        scoreKey:  'rain_score',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       () => 100,
        reasonFn:  h => h.rain_status === 'no_go'    ? 'High rain risk'
          : h.rain_status === 'caution'  ? 'Rain possible'
          : h.rain_status === 'advisory' ? 'Small chance of rain'
          : 'Clear skies',
      },
      {
        label:     'Crowd (%)',
        key:       'busyness_score',
        statusKey: 'crowd_status',
        scoreKey:  'crowd_score',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       () => 100,
        reasonFn:  h => h.crowd_status === 'no_go'    ? 'Too crowded'
          : h.crowd_status === 'caution'  ? 'Getting busy'
          : h.crowd_status === 'advisory' ? 'Moderate crowds'
          : 'Good crowd level',
      },
      {
        label:     'UV',
        key:       'uv_index',
        statusKey: 'uv_status',
        scoreKey:  'uv_score',
        fmt:       v => v !== null ? v.toFixed(1) : '',
        max:       () => Math.max(...hours.map(x => x.uv_index ?? 0), 1),
        reasonFn:  h => h.uv_status === 'no_go'    ? 'Extreme UV — danger'
          : h.uv_status === 'caution'  ? 'High UV — protect skin'
          : h.uv_status === 'advisory' ? 'Elevated UV'
          : 'UV manageable',
      },
      {
        label:     'Sand (°F)',
        key:       'sand_temp',
        statusKey: 'sand_status',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       () => Math.max(...hours.map(x => x.sand_temp ?? 0), 1),
        reasonFn:  h => h.sand_status === 'no_go'    ? 'Sand dangerously hot'
          : h.sand_status === 'caution'  ? 'Sand very hot — paw risk'
          : h.sand_status === 'advisory' ? 'Sand warm — monitor paws'
          : 'Sand temp fine',
      },
      {
        label:     'Asphalt (°F)',
        key:       'asphalt_temp',
        statusKey: 'asphalt_status',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       () => Math.max(...hours.map(x => x.asphalt_temp ?? 0), 1),
        reasonFn:  h => h.asphalt_status === 'no_go'    ? 'Asphalt dangerously hot'
          : h.asphalt_status === 'caution'  ? 'Asphalt very hot — paw risk'
          : h.asphalt_status === 'advisory' ? 'Asphalt warm — monitor paws'
          : 'Asphalt temp fine',
      },
    ];

    // Keep only metrics that appear on the status board (have ≥1 non-go hour)
    const statusRank = { no_go: 3, caution: 2, advisory: 1 };
    const worstStatus = m => hours.reduce((worst, h) => {
      const s = h[m.statusKey];
      return s && s !== 'go' && (statusRank[s] ?? 0) > (statusRank[worst] ?? 0) ? s : worst;
    }, null);

    const activeMiddle = candidateMetrics
      .filter(m => hours.some(h => { const s = h[m.statusKey]; return s && s !== 'go'; }))
      .sort((a, b) => (statusRank[worstStatus(b)] ?? 0) - (statusRank[worstStatus(a)] ?? 0));

    const metrics = [scoreMetric, ...activeMiddle, weatherMetric, tempMetric];

    const chartsHtml = metrics.map(m => buildMetricRow(m, hours, day)).join('');


    // Narrative
    const narrativeHtml = buildNarrative(day);

    document.getElementById('main-content').innerHTML = `
      <div class="board-and-charts">
        <div class="charts">${chartsHtml}</div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-window)"></div> Best Time</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-go)"></div> Go</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-advisory)"></div> Advisory</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-caution)"></div> Caution</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-no_go)"></div> No Go</div>
      </div>
      ${narrativeHtml}
    `;
  }

  function buildStatusBoard(hours) {
    const metrics = [
      {
        label: 'Tide',
        statusKey: 'tide_status',
        valueKey: 'tide_height',
        fmt: v => v != null ? `${v.toFixed(1)} ft` : '—',
        worstVal: vals => Math.max(...vals),
      },
      {
        label: 'Wind',
        statusKey: 'wind_status',
        valueKey: 'wind_speed',
        fmt: v => v != null ? `${Math.round(v)} mph` : '—',
        worstVal: vals => Math.max(...vals),
      },
      {
        label: 'Rain',
        statusKey: 'rain_status',
        valueKey: 'precip_chance',
        fmt: v => v != null ? `${Math.round(v)}%` : '—',
        worstVal: vals => Math.max(...vals),
      },
      {
        label: 'Crowd',
        statusKey: 'crowd_status',
        valueKey: 'busyness_score',
        fmt: v => v != null ? `${Math.round(v)}/100` : '—',
        worstVal: vals => Math.max(...vals),
      },
      {
        label: 'Temp',
        statusKey: 'temp_status',
        valueKey: 'temp_air',
        fmt: v => v != null ? `${Math.round(v)}°F` : '—',
        worstVal: vals => vals.reduce((a, b) => Math.abs(b - 72) > Math.abs(a - 72) ? b : a, vals[0]),
      },
      {
        label: 'UV',
        statusKey: 'uv_status',
        valueKey: 'uv_index',
        fmt: v => v != null ? `UV ${v.toFixed(1)}` : '—',
        worstVal: vals => Math.max(...vals),
      },
      {
        label: 'Sand',
        statusKey: 'sand_status',
        valueKey: 'sand_temp',
        fmt: v => v != null ? `${Math.round(v)}°F` : '—',
        worstVal: vals => Math.max(...vals),
      },
      {
        label: 'Asphalt',
        statusKey: 'asphalt_status',
        valueKey: 'asphalt_temp',
        fmt: v => v != null ? `${Math.round(v)}°F` : '—',
        worstVal: vals => Math.max(...vals),
      },
    ];

    const statusOrder = { no_go: 3, caution: 2, advisory: 1 };
    const statusColor = {
      no_go:    'var(--red)',
      caution:  'var(--amber)',
      advisory: 'var(--advisory)',
    };

    function fmtHour(h) {
      if (h === 0)  return '12am';
      if (h === 12) return '12pm';
      return h < 12 ? `${h}am` : `${h - 12}pm`;
    }

    function getBlocks(flagged) {
      if (!flagged.length) return [];
      const blocks = [];
      let cur = [flagged[0]];
      for (let i = 1; i < flagged.length; i++) {
        if (flagged[i].local_hour === flagged[i - 1].local_hour + 1) {
          cur.push(flagged[i]);
        } else {
          blocks.push(cur);
          cur = [flagged[i]];
        }
      }
      blocks.push(cur);
      return blocks;
    }

    const items = [];

    for (const metric of metrics) {
      const flagged = hours.filter(h => {
        const s = h[metric.statusKey];
        return s && s !== 'go';
      });
      if (!flagged.length) continue;

      let blocks = getBlocks(flagged);

      // 3+ blocks → keep the 2 largest, sorted back to chronological order
      if (blocks.length >= 3) {
        blocks = blocks
          .slice()
          .sort((a, b) => b.length - a.length)
          .slice(0, 2)
          .sort((a, b) => a[0].local_hour - b[0].local_hour);
      }

      const allHours = blocks.flat();

      // Worst status across selected blocks
      const worstStatus = allHours.reduce((worst, h) => {
        const s = h[metric.statusKey];
        return (statusOrder[s] ?? 0) > (statusOrder[worst] ?? 0) ? s : worst;
      }, 'advisory');

      // Worst value
      const vals = allHours.map(h => h[metric.valueKey]).filter(v => v != null);
      const worstValue = vals.length ? metric.worstVal(vals) : null;

      // Time ranges
      const timeRanges = blocks.map(block => {
        const start = fmtHour(block[0].local_hour);
        const end   = fmtHour(block[block.length - 1].local_hour + 1);
        return `${start}–${end}`;
      });

      const color = statusColor[worstStatus] ?? 'var(--text-muted)';
      items.push(`
        <div class="sb-item">
          <div class="sb-metric" style="color:${color}">${metric.label}</div>
          <div class="sb-value">${metric.fmt(worstValue)}</div>
          <div class="sb-time">${timeRanges.join(', ')}</div>
        </div>`);
    }

    if (!items.length) return '';
    return `<div class="status-board">${items.join('')}</div>`;
  }

  function buildMetricRow(metric, hours, day) {
    const statusRank = { no_go: 3, caution: 2, advisory: 1 };
    const values  = hours.map(h => h[metric.key]);
    const maxVal  = metric.max ? metric.max(hours) : Math.max(...values.filter(v => v !== null), 1);
    const minVal  = metric.relative ? Math.min(...values.filter(v => v !== null)) : 0;
    const range   = Math.max(maxVal - minVal, 1);
    const maxHeight = metric.barMaxHeight ?? 22; // px

    const barsHtml = hours.map(h => {
      const raw     = h[metric.key];
      const val     = metric.parse ? metric.parse(raw) : raw;
      const metricStatus = metric.statusFn ? metric.statusFn(h) : (metric.statusKey ? h[metric.statusKey] : null);
      const barColor = metric.colorFn ? metric.colorFn(h)
        : metric.statusKey
          ? (metricStatus === 'no_go'    ? 'var(--bar-no_go)'
           : metricStatus === 'caution'  ? 'var(--bar-caution)'
           : metricStatus === 'advisory' ? 'var(--bar-advisory)'
           :                               'var(--bar-go)')
          : (h.is_in_best_window         ? 'var(--bar-window)'
           : h.hour_status === 'no_go'   ? 'var(--bar-no_go)'
           : h.hour_status === 'caution' ? 'var(--bar-caution)'
           : h.hour_status === 'advisory'? 'var(--bar-advisory)'
           :                               'var(--bar-go)');
      const pct     = val !== null ? Math.max((val - minVal) / range, 0.05) : 0.05;
      const height  = Math.round(pct * maxHeight);
      const display = metric.fmt(raw, h);
      const dog     = metric.barIconFn ? metric.barIconFn(h) : (h.is_in_best_window ? '🐶' : '');

      const activeStatus = metric.statusFn ? metric.statusFn(h) : (metric.statusKey ? h[metric.statusKey] : h.hour_status);
      const statusIcon  = activeStatus === 'go' ? '✓' : activeStatus === 'no_go' ? '✕' : '⚠';
      const statusText  = activeStatus === 'go' ? 'Go' : activeStatus === 'advisory' ? 'Advisory' : activeStatus === 'caution' ? 'Caution' : 'No Go';
      const statusClass = `tooltip-status-${activeStatus}`;
      const reason      = metric.reasonFn ? metric.reasonFn(h) : '';
      const scoreVal    = metric.scoreKey ? h[metric.scoreKey] : null;
      const scoreLine   = scoreVal !== null ? Math.round(scoreVal * 100) : (metric.key === 'hour_score' && val !== null ? Math.round(val) : null);
      const metricLine  = display ? `${metric.label}: ${display}` : '';

      // Score bar gets a component breakdown chart
      const isScoreBar = metric.key === 'hour_score';

      // Score tooltip header: per-metric advisories/warnings, each
      // line colored to match the metric's status. Empty when every
      // metric is 'go' for this hour.
      const scoreAdvisories = isScoreBar ? (() => {
        const items = [
          { icon: '🌊',  label: 'Tide',    status: h.tide_status    },
          { icon: '💨',  label: 'Wind',    status: h.wind_status    },
          { icon: '🌧️', label: 'Rain',    status: h.rain_status    },
          { icon: '👥',  label: 'Crowd',   status: h.crowd_status   },
          { icon: '🌡️', label: 'Temp',    status: h.temp_status    },
          { icon: '☀️',  label: 'UV',      status: h.uv_status      },
          { icon: '🏖️', label: 'Sand',    status: h.sand_status    },
          { icon: '🚶',  label: 'Asphalt', status: h.asphalt_status },
          { icon: WMO_ICONS[h.weather_code] ?? '🌤️',
            label: 'Weather', status: wmoStatus(h.weather_code) },
        ];
        const sevLabel = s => s === 'no_go' ? 'No Go' : s === 'caution' ? 'Caution' : 'Advisory';
        return items
          .filter(it => it.status && it.status !== 'go')
          .sort((a, b) => (statusRank[b.status] ?? 0) - (statusRank[a.status] ?? 0))
          .map(it => `<div class="tooltip-line tooltip-status-${it.status}">${it.icon} ${it.label}: ${sevLabel(it.status)}</div>`)
          .join('');
      })() : '';

      const breakdownHtml = isScoreBar ? (() => {
        const components = [
          { label: '🌊',  score: h.tide_score,    status: h.tide_status           },
          { label: '💨',  score: h.wind_score,    status: h.wind_status           },
          { label: '🌧️', score: h.rain_score,    status: h.rain_status           },
          { label: '👥',  score: h.crowd_score,   status: h.crowd_status          },
          { label: WMO_ICONS[h.weather_code] ?? '🌤️',
                          score: h.weather_score, status: wmoStatus(h.weather_code) },
          { label: '🌡️', score: h.temp_score,    status: h.temp_status           },
          { label: '☀️',  score: h.uv_score,      status: h.uv_status             },
        ];
        const firing = components
          .filter(c => c.status && c.status !== 'go')
          .sort((a, b) => (statusRank[b.status] ?? 0) - (statusRank[a.status] ?? 0));
        if (firing.length === 0) return '';
        const rows = firing.map(c => {
          // Inverted: bar length = 100 - score. Worst offenders (low
          // raw score) get the longest bar. Falls back to status-based
          // lengths when the per-component score is null.
          const raw   = c.score !== null ? Math.round((1 - c.score) * 100)
                      : c.status === 'no_go'    ? 100
                      : c.status === 'caution'  ? 60
                      : c.status === 'advisory' ? 30
                      : 0;
          const pct   = Math.max(raw, 8);
          const color = c.status === 'no_go' ? 'var(--bar-no_go)' : c.status === 'caution' ? 'var(--bar-caution)' : 'var(--bar-advisory)';
          return `<div class="tt-row">
            <div class="tt-track"><div class="tt-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="tt-label">${c.label}</div>
          </div>`;
        }).join('');
        return `<div class="tt-breakdown">${rows}</div>`;
      })() : '';

      return `
        <div class="bar-col">
          <div class="bar-dog">${dog}</div>
          <div class="bar-value">${display}</div>
          <div class="bar" style="height:${height}px;background:${barColor}"></div>
          <div class="tooltip">
            <div class="tooltip-hour">${h.hour_label}</div>
            ${isScoreBar
              ? ''
              : `<div class="tooltip-line ${statusClass}">${statusIcon} ${statusText}${scoreLine !== null ? ` · ${scoreLine}` : ''}</div>
                 ${metricLine ? `<div class="tooltip-line">${metricLine}</div>` : ''}
                 ${reason     ? `<div class="tooltip-line">${reason}</div>` : ''}`
            }
            ${breakdownHtml}
          </div>
        </div>`;
    }).join('');

    const xAxisHtml = hours.map((h, i) => {
      const label = (i % 2 === 0) ? h.hour_label : '';
      return `<div class="x-label">${label}</div>`;
    }).join('');

    return `
      <div class="metric-row">
        <div class="metric-label">${metric.label}</div>
        <div class="bars-wrap" style="${metric.wrapStyle ?? ''}">${barsHtml}</div>
        <div class="x-axis">${xAxisHtml}</div>
      </div>`;
  }

  function buildNarrative(day) {
    const blocks = [];

    if (day.bacteria_risk === 'high' || day.bacteria_risk === 'moderate') {
      const color  = day.bacteria_risk === 'high' ? 'red' : 'amber';
      const label  = day.bacteria_risk === 'high' ? 'Water Quality Advisory' : 'Water Quality Notice';
      const precip = day.precip_72h_mm != null ? ` (${day.precip_72h_mm}mm in past 72h)` : '';
      const msg    = day.bacteria_risk === 'high'
        ? `Heavy recent rainfall${precip} has likely elevated bacteria levels. Avoid letting your dog swim — stick to dry sand play.`
        : `Recent rainfall${precip} exceeds the 0.1"/72h SoCal advisory threshold. Bacteria levels may be elevated — consider limiting swimming.`;
      blocks.push(`
        <div class="narrative-block">
          <div class="narrative-label">${label}</div>
          <div class="narrative-text ${color}">${msg}</div>
        </div>`);
    }

    if (day.no_go_text) {
      blocks.push(`
        <div class="narrative-block">
          <div class="narrative-label">No Go</div>
          <div class="narrative-text red">${day.no_go_text}</div>
        </div>`);
    }

    if (blocks.length === 0) return '';
    return `<div class="narrative">${blocks.join('')}</div>`;
  }

  // ── Product chip strip — condition-based (replace mode) ─────────
  // Bowl is universal. Tide-low + clean water → swim kit (ball/towel).
  // Per-metric statuses (uv/sand/asphalt/crowd) drive the rest.
  const CHIP_DEFS = {
    bowl:      { icon: '💧',  label: 'Collapsible Bowl', href: 'https://www.amazon.com/s?k=collapsible+dog+water+bowl' },
    ball:      { icon: '🦴',  label: 'Fetch Ball',       href: 'https://www.amazon.com/s?k=chuckit+ball+launcher' },
    towel:     { icon: '🛍️', label: 'Quick-Dry Towel',  href: 'https://www.amazon.com/s?k=microfiber+dog+towel' },
    sunscreen: { icon: '🌞',  label: 'Dog Sunscreen',    href: 'https://www.amazon.com/s?k=dog+sunscreen' },
    booties:   { icon: '👟',  label: 'Booties',          href: 'https://www.amazon.com/s?k=dog+boots+for+hot+sand' },
    leash:     { icon: '🐕',  label: 'Long Leash',       href: 'https://www.amazon.com/s?k=long+dog+training+leash' },
  };

  function chipHtml(def) {
    return `<a class="product-chip" href="${def.href}" target="_blank" rel="noopener noreferrer">[ ${def.icon} ${def.label} ]</a>`;
  }

  function buildChipStripHtml(day, hours) {
    // Each candidate carries an intensity (0–3). Filter > 0, sort desc,
    // cap at 3. Bowl carries a low baseline so it shows on calm days
    // but loses out when 3 conditional chips fire harder.
    const sevRank = { no_go: 3, caution: 2, advisory: 1 };
    const maxStatusSeverity = (key) => {
      let m = 0;
      for (const h of hours ?? []) {
        const r = sevRank[h[key]] ?? 0;
        if (r > m) m = r;
      }
      return m;
    };
    const tide      = day.lowest_tide_height === null ? null : Number(day.lowest_tide_height);
    const swimSafe  = !day.bacteria_risk || day.bacteria_risk === 'none' || day.bacteria_risk === 'low';
    const tideInt   = (!swimSafe || tide === null) ? 0
                    : tide <= 0   ? 3
                    : tide <= 0.5 ? 2
                    : tide <= 1.0 ? 1 : 0;
    const busyInt   = day.busyness_category === 'too_crowded' ? 3
                    : day.busyness_category === 'dog_party'   ? 2 : 0;

    const candidates = [
      { def: CHIP_DEFS.bowl,      intensity: 0.5 },
      { def: CHIP_DEFS.ball,      intensity: tideInt },
      { def: CHIP_DEFS.towel,     intensity: tideInt },
      { def: CHIP_DEFS.sunscreen, intensity: maxStatusSeverity('uv_status') },
      { def: CHIP_DEFS.booties,   intensity: Math.max(maxStatusSeverity('sand_status'),
                                                       maxStatusSeverity('asphalt_status')) },
      { def: CHIP_DEFS.leash,     intensity: Math.max(maxStatusSeverity('crowd_status'), busyInt) },
    ];

    return candidates
      .filter(c => c.intensity > 0)
      .sort((a, b) => b.intensity - a.intensity)
      .slice(0, 3)
      .map(c => chipHtml(c.def))
      .join('');
  }

  // ── Scout header blurb ───────────────────────────────────────────
  async function loadScoutBlurb(locationId, date, day, hours) {
    const el = document.getElementById('scout-blurb');
    if (!el) return;

    const statusRank = { no_go: 3, caution: 2, advisory: 1 };
    const worstSandStatus = (hours ?? []).reduce((worst, h) => {
      return (statusRank[h.sand_status] ?? 0) > (statusRank[worst] ?? 0) ? h.sand_status : worst;
    }, null);

    const windowLabel  = day.best_window_label  ?? 'the best window';
    const windowStatus = day.best_window_status ?? 'go';
    const signals = [
      day.lowest_tide_height != null ? `tide ${parseFloat(day.lowest_tide_height).toFixed(1)}ft` : null,
      day.avg_wind  != null ? `wind ${Math.round(day.avg_wind)}mph`        : null,
      day.avg_temp  != null ? `temp ${Math.round(day.avg_temp)}°F`         : null,
      day.avg_uv    != null ? `UV index ${parseFloat(day.avg_uv).toFixed(1)}` : null,
      day.busyness_category ? `crowds: ${day.busyness_category}`           : null,
      worstSandStatus && worstSandStatus !== 'go' ? `sand: ${worstSandStatus}` : null,
      day.bacteria_risk && day.bacteria_risk !== 'none' ? `bacteria risk: ${day.bacteria_risk}` : null,
    ].filter(Boolean).join(', ');

    const question =
      `Best window: ${windowLabel} (${windowStatus}). Conditions: ${signals}. ` +
      `Write exactly three sentences of flowing prose — no headers, no bullets, no lists: ` +
      `Sentence 1: when the best window is and the main reason why, using vivid descriptive language not raw numbers. ` +
      `Sentence 2: any cautions or advisories during that window; if conditions are clean, skip this sentence entirely. ` +
      `Sentence 3: pack list for a dog owner and their dog — lead with the dog's needs first. Always mention fresh water for the dog. Add a towel and fetch ball if tide is low and good for swimming. Add dog sunscreen if UV is high. Suggest dog booties if sand is hot. Suggest a long leash if crowds are dog_party or too_crowded. Human comfort items (hoodie, windbreaker, sunscreen) are secondary and only worth mentioning if the conditions strongly call for it — the dog comes first. One sentence, natural prose.`;

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/beach-chat`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ location_id: locationId, question, conversation_history: [] }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { answer } = await res.json();
      if (answer) {
        el.style.opacity = '1';
        if (typeof window.withProductLinks === 'function') {
          el.innerHTML = window.withProductLinks(answer);
        } else {
          el.textContent = answer;
        }
      } else {
        el.remove();
      }
    } catch {
      el.remove();
    }
  }

  // ── Error ─────────────────────────────────────────────────────────
  function showError(msg) {
    document.getElementById('main-content').innerHTML = `
      <div class="state">
        <div class="state-icon">🐕</div>
        <div class="state-text">${msg}</div>
      </div>`;
  }

</script>

<script>
  window.CHAT_CONFIG = {
    getLocationId: () => locationId,
    getLocalDate:  () => date,
    placeholder: 'What time should I go today?',
  };
</script>
<script src="src/chat.js"></script>
