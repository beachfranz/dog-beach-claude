<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Beach Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --surface:      #181c27;
      --border:       #252a3a;
      --text:         #e8eaf0;
      --text-muted:   #6b7280;
      --text-dim:     #4b5268;
      --green:        #4ade80;
      --amber:        #fbbf24;
      --red:          #ef4444;
      --blue:         #60a5fa;
      --bar-blue:     #38bdf8;
      --bar-green:    #4ade80;
      --bar-red:      #ef4444;
      --radius:       14px;
      --radius-sm:    8px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 48px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 20px 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; flex-direction: column; gap: 2px; }

    .header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .window-label {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--green);
    }

    .window-label.caution { color: var(--amber); }
    .window-label.no_go   { color: var(--red); }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 4px;
      text-decoration: none;
    }

    .close-btn:hover { color: var(--text); background: #1e2333; }

    /* ── Charts ───────────────────────────────────────────────────── */
    .charts { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 12px; }

    .metric-row { display: flex; flex-direction: column; gap: 6px; }

    .metric-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .bars-wrap {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 44px;
      position: relative;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }

    .bar-value {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
      line-height: 1;
    }

    .bar-dog {
      font-size: 10px;
      line-height: 1;
      min-height: 12px;
    }

    .bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      transition: opacity 0.15s;
    }

    /* x-axis labels */
    .x-axis {
      display: flex;
      gap: 3px;
      padding: 2px 0 0;
    }

    .x-label {
      flex: 1;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
    }

    /* ── Legend ───────────────────────────────────────────────────── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 16px 20px 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Narrative ────────────────────────────────────────────────── */
    .narrative {
      margin: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .narrative-block { display: flex; flex-direction: column; gap: 4px; }

    .narrative-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .narrative-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
    }

    .narrative-text.amber { color: var(--amber); }
    .narrative-text.red   { color: var(--red); }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    .bar-col { position: relative; }

    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2333;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
    }

    .tooltip-hour {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 3px;
    }

    .tooltip-line {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .tooltip-status-go      { color: var(--green); }
    .tooltip-status-caution { color: var(--amber); }
    .tooltip-status-no_go   { color: var(--red); }

    .bar-col:hover .tooltip { display: block; }

    /* ── Loading / error ──────────────────────────────────────────── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 12px;
    }

    .state-icon { font-size: 36px; }

    .state-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-left" id="header-left">
      <div class="header-title">
        <span>🐶</span>
        <span id="day-title">Loading...</span>
      </div>
      <div class="window-label" id="window-label"></div>
    </div>
    <a class="close-btn" id="close-btn" href="index.html">✕</a>
  </header>

  <div id="main-content">
    <div class="state">
      <div class="state-icon">🐾</div>
      <div class="state-text">Loading forecast...</div>
    </div>
  </div>

</div>
<script>
  // ── Config ────────────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://ehlzbwtrsxaaukurekau.supabase.co';
  const ANON_KEY      = 'sb_publishable_o2d4Kg0xMZoMw92feO2uWQ_PdDfQXKj';

  // ── Params ────────────────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const locationId = params.get('location') ?? 'huntington-dog-beach';
  const today      = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toISOString().slice(0, 10);
  const date       = params.get('date') ?? today;

  // Fix close button to preserve location
  document.getElementById('close-btn').href = `index.html?location=${locationId}`;

  loadDetail(locationId, date);

  // ── Fetch ─────────────────────────────────────────────────────────
  async function loadDetail(locationId, date) {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/get-beach-detail?location_id=${locationId}&date=${date}`,
        { headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' } }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      render(data);
    } catch (err) {
      showError(err.message);
    }
  }

  // ── Render ────────────────────────────────────────────────────────
  function render({ beach, day, hours }) {
    // Header
    const dateObj  = new Date(date + 'T12:00:00');
    const dayName  = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
    document.title = `${dayName} — ${beach.display_name}`;
    document.getElementById('day-title').textContent = dayName;

    const winLabel = document.getElementById('window-label');
    if (day.best_window_label) {
      winLabel.textContent = day.best_window_label;
      winLabel.className = `window-label ${day.best_window_status ?? ''}`;
    }
    if (day.best_window_text) {
      const bwt = document.createElement('div');
      bwt.style.cssText = "font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;color:var(--text-muted);margin-top:4px;";
      bwt.textContent = day.best_window_text;
      document.getElementById('header-left').appendChild(bwt);
    }

    if (hours.length === 0) {
      showError('No hourly data available for this date.');
      return;
    }

    // Build metrics
    const metrics = [
      {
        label: 'Tide (ft)',
        key:   'tide_height',
        fmt:   v => v !== null ? v.toFixed(1) : '',
        max:   h => Math.max(...hours.map(x => x.tide_height ?? 0), 0.1),
      },
      {
        label: 'Wind (mph)',
        key:   'wind_speed',
        fmt:   v => v !== null ? Math.round(v) : '',
        max:   h => Math.max(...hours.map(x => x.wind_speed ?? 0), 1),
      },
      {
        label: 'Temp (°F)',
        key:   'temp_air',
        fmt:   v => v !== null ? Math.round(v) : '',
        max:   h => Math.max(...hours.map(x => x.temp_air ?? 0), 1),
        // Temp bars all same height — show relative variation from min
        relative: true,
      },
      {
        label: 'Rain (%)',
        key:   'precip_chance',
        fmt:   v => v !== null ? Math.round(v) : '',
        max:   h => 100,
      },
      {
        label: 'Crowd (%)',
        key:   'busyness_score',
        fmt:   v => v !== null ? Math.round(v) : '',
        max:   h => 100,
      },
    ];

    const chartsHtml = metrics.map(m => buildMetricRow(m, hours, day)).join('');


    // Narrative
    const narrativeHtml = buildNarrative(day);

    document.getElementById('main-content').innerHTML = `
      <div class="charts">${chartsHtml}</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> Best Time</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Good</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Caution</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> No Go</div>
      </div>
      ${narrativeHtml}
    `;
  }

  function buildMetricRow(metric, hours, day) {
    const values  = hours.map(h => h[metric.key]);
    const maxVal  = metric.max ? metric.max(hours) : Math.max(...values.filter(v => v !== null), 1);
    const minVal  = metric.relative ? Math.min(...values.filter(v => v !== null)) : 0;
    const range   = Math.max(maxVal - minVal, 1);
    const maxHeight = 32; // px

    const barsHtml = hours.map(h => {
      const val     = h[metric.key];
      const barColor = h.is_in_best_window ? '#16a34a' : h.hour_status === 'caution' ? '#f59e0b' : h.hour_status === 'no_go' ? '#ef4444' : '#4ade80';
      const pct     = val !== null ? Math.max((val - minVal) / range, 0.05) : 0.05;
      const height  = Math.round(pct * maxHeight);
      const display = metric.fmt(val);
      const dog     = h.is_in_best_window ? '🐶' : '';

      const statusLabel = h.is_in_best_window ? '✓ Best Window' : h.hour_status === 'go' ? '✓ Go' : h.hour_status === 'caution' ? '⚠ Caution' : '✕ No Go';
      const statusClass = `tooltip-status-${h.hour_status}`;
      const metricLine  = display ? `${metric.label}: ${display}` : '';

      return `
        <div class="bar-col">
          <div class="bar-dog">${dog}</div>
          <div class="bar-value">${display}</div>
          <div class="bar" style="height:${height}px;background:${barColor}"></div>
          <div class="tooltip">
            <div class="tooltip-hour">${h.hour_label}</div>
            ${metricLine ? `<div class="tooltip-line">${metricLine}</div>` : ''}
            <div class="tooltip-line ${statusClass}">${statusLabel}</div>
          </div>
        </div>`;
    }).join('');

    const xAxisHtml = hours.map((h, i) => {
      const label = (i % 2 === 0) ? h.hour_label : '';
      return `<div class="x-label">${label}</div>`;
    }).join('');

    return `
      <div class="metric-row">
        <div class="metric-label">${metric.label}</div>
        <div class="bars-wrap">${barsHtml}</div>
        <div class="x-axis">${xAxisHtml}</div>
      </div>`;
  }

  function buildNarrative(day) {
    const blocks = [];

    if (day.day_text) {
      blocks.push(`
        <div class="narrative-block">
          <div class="narrative-label">Day Summary</div>
          <div class="narrative-text">${day.day_text}</div>
        </div>`);
    }

    if (day.caution_text) {
      blocks.push(`
        <div class="narrative-block">
          <div class="narrative-label">Caution</div>
          <div class="narrative-text amber">${day.caution_text}</div>
        </div>`);
    }

    if (day.no_go_text) {
      blocks.push(`
        <div class="narrative-block">
          <div class="narrative-label">No Go</div>
          <div class="narrative-text red">${day.no_go_text}</div>
        </div>`);
    }

    if (blocks.length === 0) return '';

    return `<div class="narrative">${blocks.join('')}</div>`;
  }

  // ── Error ─────────────────────────────────────────────────────────
  function showError(msg) {
    document.getElementById('main-content').innerHTML = `
      <div class="state">
        <div class="state-icon">🐕</div>
        <div class="state-text">${msg}</div>
      </div>`;
  }

  // ── Chat ──────────────────────────────────────────────────────────
  const chatHistory = [];

  function toggleChat() {
    const panel = document.getElementById('chat-panel');
    const isOpen = panel.style.transform === 'translateY(0px)';
    panel.style.transform = isOpen ? 'translateY(100%)' : 'translateY(0px)';
    if (!isOpen) document.getElementById('chat-input').focus();
  }

  async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    appendChatMessage('user', question);
    chatHistory.push({ role: 'user', content: question });

    const typingId = appendTyping();

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/beach-chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON_KEY}` },
        body: JSON.stringify({ location_id: locationId, question, conversation_history: chatHistory.slice(0, -1) }),
      });
      const data = await res.json();
      removeTyping(typingId);
      const answer = data.answer ?? data.error ?? 'Something went wrong.';
      appendChatMessage('assistant', answer);
      chatHistory.push({ role: 'assistant', content: answer });
    } catch (err) {
      removeTyping(typingId);
      appendChatMessage('assistant', 'Could not reach the server. Try again.');
    }
  }

  function appendChatMessage(role, text) {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `chat-msg chat-msg-${role}`;
    div.textContent = text;
    if (role === 'assistant') {
      const row = document.createElement('div');
      row.className = 'chat-msg-row';
      const img = document.createElement('img');
      img.src = 'src/avatar.png';
      img.className = 'chat-avatar';
      img.alt = '';
      row.appendChild(img);
      row.appendChild(div);
      msgs.appendChild(row);
    } else {
      msgs.appendChild(div);
    }
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function appendTyping() {
    const msgs = document.getElementById('chat-messages');
    const row = document.createElement('div');
    row.className = 'chat-msg-row';
    row.id = 'typing-' + Date.now();
    const img = document.createElement('img');
    img.src = 'src/avatar.png';
    img.className = 'chat-avatar';
    img.alt = '';
    const div = document.createElement('div');
    div.className = 'chat-msg chat-msg-assistant chat-typing';
    div.textContent = '...';
    row.appendChild(img);
    row.appendChild(div);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return row.id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      const panel = document.getElementById('chat-panel');
      panel.style.transform = 'translateY(100%)';
    }
  });
</script>

<!-- ── Chat UI ─────────────────────────────────────────────────── -->
<style>
  .chat-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 200;
    transition: background 0.15s;
  }
  .chat-fab:hover { background: #1e2333; }

  .chat-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translate(-50%, 100%);
    width: 100%;
    max-width: 480px;
    height: 35vh;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    display: flex;
    flex-direction: column;
    z-index: 300;
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-header-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .chat-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .chat-close:hover { background: var(--border); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chat-msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .chat-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
  }

  .chat-msg {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 8px 12px;
    border-radius: 12px;
    max-width: 85%;
    word-wrap: break-word;
  }
  .chat-msg-user {
    align-self: flex-end;
    background: #1e3a5f;
    color: var(--text);
    border-bottom-right-radius: 4px;
  }
  .chat-msg-assistant {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .chat-typing { color: var(--text-muted); }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 10px 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }
  .chat-input:focus { border-color: #3b5bdb; }
  .chat-input::placeholder { color: var(--text-dim); }
  .chat-send {
    background: #3b5bdb;
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .chat-send:hover { background: #4c6ef5; }
  .chat-send:active { background: #2f4ac0; }
</style>

<button class="chat-fab" onclick="toggleChat()" title="Ask about conditions">🐾</button>

<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <div class="chat-header-left">
      <img src="src/avatar.png" class="chat-avatar" alt="">
      <span class="chat-header-title">Ask Cooper</span>
    </div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chat-input" type="text" placeholder="What time should I go today?" onkeydown="if(event.key==='Enter')sendChatMessage()" />
    <button class="chat-send" onclick="sendChatMessage()">Ask Coop</button>
  </div>
</div>

</body>
</html>
