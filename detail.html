<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Beach Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/chat.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --surface:      #181c27;
      --border:       #252a3a;
      --text:         #e8eaf0;
      --text-muted:   #6b7280;
      --text-dim:     #4b5268;
      --green:        #4ade80;
      --amber:        #fbbf24;
      --red:          #ef4444;
      --blue:         #60a5fa;
      --bar-blue:     #38bdf8;
      --bar-green:    #4ade80;
      --bar-red:      #ef4444;
      --radius:       14px;
      --radius-sm:    8px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 48px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 20px 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; flex-direction: column; gap: 2px; }

    .header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .window-label {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--green);
    }

    .window-label.caution { color: var(--amber); }
    .window-label.no_go   { color: var(--red); }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 4px;
      text-decoration: none;
    }

    .close-btn:hover { color: var(--text); background: #1e2333; }

    /* ── Charts ───────────────────────────────────────────────────── */
    .charts { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 12px; }

    .metric-row { display: flex; flex-direction: column; gap: 6px; }

    .metric-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .bars-wrap {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 44px;
      position: relative;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }

    .bar-value {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
      line-height: 1;
    }

    .bar-dog {
      font-size: 10px;
      line-height: 1;
      min-height: 12px;
    }

    .bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      transition: opacity 0.15s;
    }

    /* x-axis labels */
    .x-axis {
      display: flex;
      gap: 3px;
      padding: 2px 0 0;
    }

    .x-label {
      flex: 1;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
    }

    /* ── Legend ───────────────────────────────────────────────────── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 16px 20px 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Narrative ────────────────────────────────────────────────── */
    .narrative {
      margin: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .narrative-block { display: flex; flex-direction: column; gap: 4px; }

    .narrative-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .narrative-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
    }

    .narrative-text.amber { color: var(--amber); }
    .narrative-text.red   { color: var(--red); }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    .bar-col { position: relative; }

    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2333;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
    }

    .tooltip-hour {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 3px;
    }

    .tooltip-line {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .tooltip-status-go      { color: var(--green); }
    .tooltip-status-caution { color: var(--amber); }
    .tooltip-status-no_go   { color: var(--red); }

    .bar-col:hover .tooltip { display: block; }

    /* ── Score tooltip breakdown bars ───────────────────────────── */
    .tt-breakdown { margin-top: 5px; display: flex; flex-direction: column; gap: 3px; }
    .tt-row { display: flex; align-items: center; gap: 5px; }
    .tt-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); width: 32px; text-align: right; flex-shrink: 0; }
    .tt-track { width: 64px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .tt-fill  { height: 100%; border-radius: 3px; }

    /* ── Loading / error ──────────────────────────────────────────── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 12px;
    }

    .state-icon { font-size: 36px; }

    .state-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-left" id="header-left">
      <div class="header-title">
        <img src="src/avatar.png" style="width:28px;height:28px;border-radius:50%;cursor:pointer;" alt="Scout" onclick="toggleChat()" title="Ask Scout">
        <span id="day-title">Loading...</span>
      </div>
      <div class="window-label" id="window-label"></div>
    </div>
    <a class="close-btn" id="close-btn" href="index.html">✕</a>
  </header>

  <div id="main-content">
    <div class="state">
      <div class="state-icon">🐾</div>
      <div class="state-text">Loading forecast...</div>
    </div>
  </div>

</div>
<script>
  // ── Config ────────────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://ehlzbwtrsxaaukurekau.supabase.co';
  const ANON_KEY      = 'sb_publishable_lAg7YdZ3w7S5fN8jgiExKQ_3-KtW3xk';

  // ── Params ────────────────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const locationId = params.get('location') ?? 'huntington-dog-beach';
  const today      = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toISOString().slice(0, 10);
  const date       = params.get('date') ?? today;

  // Fix close button to preserve location
  document.getElementById('close-btn').href = `index.html?location=${locationId}`;

  loadDetail(locationId, date);

  // ── Fetch ─────────────────────────────────────────────────────────
  async function loadDetail(locationId, date) {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/get-beach-detail?location_id=${locationId}&date=${date}`,
        { headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' } }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      render(data);
    } catch (err) {
      showError(err.message);
    }
  }

  // ── Render ────────────────────────────────────────────────────────
  function render({ beach, day, hours }) {
    // Header
    const dateObj  = new Date(date + 'T12:00:00');
    const dayName  = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
    document.title = `${dayName} — ${beach.display_name}`;
    document.getElementById('day-title').textContent = `${beach.display_name} — ${dayName}`;

    const winLabel = document.getElementById('window-label');
    if (day.best_window_label) {
      winLabel.textContent = day.best_window_label;
      winLabel.className = `window-label ${day.best_window_status ?? ''}`;
    }
    // Scout blurb — loads async, shows shimmer until ready
    const blurbEl = document.createElement('div');
    blurbEl.id = 'scout-blurb';
    blurbEl.style.cssText = "font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;color:var(--text-muted);margin-top:6px;opacity:0.4;cursor:pointer;";
    blurbEl.title = 'Ask Scout';
    blurbEl.onclick = toggleChat;
    blurbEl.textContent = 'Getting Scout\'s take…';
    document.getElementById('header-left').appendChild(blurbEl);
    loadScoutBlurb(locationId, date, day);

    if (hours.length === 0) {
      showError('No hourly data available for this date.');
      return;
    }

    // Build metrics
    const metrics = [
      {
        label:    'Score',
        key:      'hour_score',
        fmt:      v => v !== null ? Math.round(Number(v)) : '',
        max:      () => 100,
        parse:    v => v !== null ? Number(v) : null,
        reasonFn: h => h.is_in_best_window ? 'Best window of the day'
          : h.hour_status === 'no_go'   ? 'Not recommended'
          : h.hour_status === 'caution' ? 'Some concerns this hour'
          : 'Looks good',
      },
      {
        label:     'Tide (ft)',
        key:       'tide_height',
        statusKey: 'tide_status',
        scoreKey:  'tide_score',
        fmt:       v => v !== null ? v.toFixed(1) : '',
        max:       h => Math.max(...hours.map(x => x.tide_height ?? 0), 0.1),
        reasonFn:  h => h.tide_status === 'no_go'   ? 'Dangerously high tide'
          : h.tide_status === 'caution' ? 'High tide — less beach'
          : 'Good tide level',
      },
      {
        label:     'Wind (mph)',
        key:       'wind_speed',
        statusKey: 'wind_status',
        scoreKey:  'wind_score',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       h => Math.max(...hours.map(x => x.wind_speed ?? 0), 1),
        reasonFn:  h => h.wind_status === 'no_go'   ? 'Dangerous wind speed'
          : h.wind_status === 'caution' ? 'Strong wind'
          : 'Calm wind',
      },
      {
        label:     'Temp (°F)',
        key:       'temp_air',
        statusKey: 'temp_status',
        scoreKey:  'temp_score',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       h => Math.max(...hours.map(x => x.temp_air ?? 0), 1),
        relative:  true,
        reasonFn:  h => h.temp_status === 'no_go'   ? 'Extreme temperature'
          : h.temp_status === 'caution' ? 'Temp outside comfort zone'
          : 'Comfortable temperature',
      },
      {
        label:     'Rain (%)',
        key:       'precip_chance',
        statusKey: 'rain_status',
        scoreKey:  'rain_score',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       h => 100,
        reasonFn:  h => h.rain_status === 'no_go'   ? 'High rain risk'
          : h.rain_status === 'caution' ? 'Rain possible'
          : 'Clear skies',
      },
      {
        label:     'Crowd (%)',
        key:       'busyness_score',
        statusKey: 'crowd_status',
        scoreKey:  'crowd_score',
        fmt:       v => v !== null ? Math.round(v) : '',
        max:       h => 100,
        reasonFn:  h => h.crowd_status === 'no_go'   ? 'Too crowded'
          : h.crowd_status === 'caution' ? 'Getting busy'
          : 'Good crowd level',
      },
    ];

    const chartsHtml = metrics.map(m => buildMetricRow(m, hours, day)).join('');


    // Narrative
    const narrativeHtml = buildNarrative(day);

    document.getElementById('main-content').innerHTML = `
      <div class="charts">${chartsHtml}</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> Best Time</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Good</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Caution</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> No Go</div>
      </div>
      ${narrativeHtml}
    `;
  }

  function buildMetricRow(metric, hours, day) {
    const values  = hours.map(h => h[metric.key]);
    const maxVal  = metric.max ? metric.max(hours) : Math.max(...values.filter(v => v !== null), 1);
    const minVal  = metric.relative ? Math.min(...values.filter(v => v !== null)) : 0;
    const range   = Math.max(maxVal - minVal, 1);
    const maxHeight = 32; // px

    const barsHtml = hours.map(h => {
      const raw     = h[metric.key];
      const val     = metric.parse ? metric.parse(raw) : raw;
      const metricStatus = metric.statusKey ? h[metric.statusKey] : null;
      const barColor = metric.statusKey
        ? (metricStatus === 'no_go'   ? '#ef4444'
         : metricStatus === 'caution' ? '#f59e0b'
         :                              '#4ade80')
        : (h.is_in_best_window        ? '#16a34a'
         : h.hour_status === 'caution' ? '#f59e0b'
         : h.hour_status === 'no_go'   ? '#ef4444'
         :                               '#4ade80');
      const pct     = val !== null ? Math.max((val - minVal) / range, 0.05) : 0.05;
      const height  = Math.round(pct * maxHeight);
      const display = metric.fmt(raw);
      const dog     = h.is_in_best_window ? '🐶' : '';

      const activeStatus = metric.statusKey ? h[metric.statusKey] : h.hour_status;
      const statusIcon  = activeStatus === 'go' ? '✓' : activeStatus === 'caution' ? '⚠' : '✕';
      const statusText  = activeStatus === 'go' ? 'Go' : activeStatus === 'caution' ? 'Caution' : 'No Go';
      const statusClass = `tooltip-status-${activeStatus}`;
      const reason      = metric.reasonFn ? metric.reasonFn(h) : '';
      const scoreVal    = metric.scoreKey ? h[metric.scoreKey] : null;
      const scoreLine   = scoreVal !== null ? Math.round(scoreVal * 100) : (metric.key === 'hour_score' && val !== null ? Math.round(val) : null);
      const metricLine  = display ? `${metric.label}: ${display}` : '';

      // Score bar gets a component breakdown chart
      const isScoreBar = metric.key === 'hour_score';
      const breakdownHtml = isScoreBar ? (() => {
        const components = [
          { label: 'Tide',  score: h.tide_score,  status: h.tide_status  },
          { label: 'Wind',  score: h.wind_score,  status: h.wind_status  },
          { label: 'Rain',  score: h.rain_score,  status: h.rain_status  },
          { label: 'Crowd', score: h.crowd_score, status: h.crowd_status },
          { label: 'Temp',  score: h.temp_score,  status: h.temp_status  },
          { label: 'UV',    score: h.uv_score,    status: h.uv_status    },
        ];
        const rows = components.map(c => {
          const raw   = c.score !== null ? Math.round(c.score * 100)
                      : c.status === 'no_go' ? 100
                      : c.status === 'caution' ? 60
                      : 0;
          const pct   = c.status ? Math.max(raw, 8) : raw;
          const color = c.status === 'no_go' ? '#ef4444' : c.status === 'caution' ? '#f59e0b' : '#4ade80';
          return `<div class="tt-row">
            <div class="tt-label">${c.label}</div>
            <div class="tt-track"><div class="tt-fill" style="width:${pct}%;background:${color}"></div></div>
          </div>`;
        }).join('');
        return `<div class="tt-breakdown">${rows}</div>`;
      })() : '';

      return `
        <div class="bar-col">
          <div class="bar-dog">${dog}</div>
          <div class="bar-value">${display}</div>
          <div class="bar" style="height:${height}px;background:${barColor}"></div>
          <div class="tooltip">
            <div class="tooltip-hour">${h.hour_label}</div>
            <div class="tooltip-line ${statusClass}">${statusIcon} ${statusText}${!isScoreBar && scoreLine !== null ? ` · ${scoreLine}` : ''}</div>
            ${metricLine ? `<div class="tooltip-line">${metricLine}</div>` : ''}
            ${reason     ? `<div class="tooltip-line">${reason}</div>` : ''}
            ${breakdownHtml}
          </div>
        </div>`;
    }).join('');

    const xAxisHtml = hours.map((h, i) => {
      const label = (i % 2 === 0) ? h.hour_label : '';
      return `<div class="x-label">${label}</div>`;
    }).join('');

    return `
      <div class="metric-row">
        <div class="metric-label">${metric.label}</div>
        <div class="bars-wrap">${barsHtml}</div>
        <div class="x-axis">${xAxisHtml}</div>
      </div>`;
  }

  function buildNarrative(day) {
    const blocks = [];

    if (day.bacteria_risk === 'high' || day.bacteria_risk === 'moderate') {
      const color  = day.bacteria_risk === 'high' ? 'red' : 'amber';
      const label  = day.bacteria_risk === 'high' ? 'Water Quality Advisory' : 'Water Quality Notice';
      const precip = day.precip_72h_mm != null ? ` (${day.precip_72h_mm}mm in past 72h)` : '';
      const msg    = day.bacteria_risk === 'high'
        ? `Heavy recent rainfall${precip} has likely elevated bacteria levels. Avoid letting your dog swim — stick to dry sand play.`
        : `Recent rainfall${precip} exceeds the 0.1"/72h SoCal advisory threshold. Bacteria levels may be elevated — consider limiting swimming.`;
      blocks.push(`
        <div class="narrative-block">
          <div class="narrative-label">${label}</div>
          <div class="narrative-text ${color}">${msg}</div>
        </div>`);
    }

    if (day.no_go_text) {
      blocks.push(`
        <div class="narrative-block">
          <div class="narrative-label">No Go</div>
          <div class="narrative-text red">${day.no_go_text}</div>
        </div>`);
    }

    if (blocks.length === 0) return '';
    return `<div class="narrative">${blocks.join('')}</div>`;
  }

  // ── Scout header blurb ───────────────────────────────────────────
  async function loadScoutBlurb(locationId, date, day) {
    const el = document.getElementById('scout-blurb');
    if (!el) return;

    const windowLabel = day.best_window_label ?? 'the best window';
    const question = `For ${date}, write 2-3 tight sentences about visiting during ${windowLabel}: ` +
      `why it's the best window today (use descriptive words like 'super low tide', 'high tide', 'mild sun', 'blazing sun' — not numbers), ` +
      `one quick practical tip (what to bring or do), ` +
      `and any caution folded in at the end if relevant. Be concise — every word should earn its place.`;

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/beach-chat`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ location_id: locationId, question, conversation_history: [] }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { answer } = await res.json();
      if (answer) {
        el.style.opacity = '1';
        el.textContent = answer;
      } else {
        el.remove();
      }
    } catch {
      el.remove();
    }
  }

  // ── Error ─────────────────────────────────────────────────────────
  function showError(msg) {
    document.getElementById('main-content').innerHTML = `
      <div class="state">
        <div class="state-icon">🐕</div>
        <div class="state-text">${msg}</div>
      </div>`;
  }

</script>

<script>
  window.CHAT_CONFIG = {
    getLocationId: () => locationId,
    placeholder: 'What time should I go today?',
  };
</script>
<script src="src/chat.js"></script>

</body>
</html>
