<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Your Beach — Dog Beach Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/chat.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #eef4f8;  /* sea fog */
      --surface:      #ffffff;
      --surface-hover:#f5f9fc;
      --border:       #d1dde8;  /* cool gray-blue */
      --text:         #0f2742;  /* marine navy */
      --text-muted:   #5b6b7d;
      --text-dim:     #94a3b8;
      --green:        #15803d;  /* hunter */
      --green-dim:    #d1fae5;
      --advisory:     #0369a1;  /* deep sea blue */
      --advisory-dim: #e0f2fe;
      --amber:        #b45309;  /* burnt orange */
      --amber-dim:    #fed7aa;
      --red:          #9f1239;  /* rose burgundy */
      --red-dim:      #ffe4e6;
      --radius:       14px;
      --radius-sm:    8px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .app { max-width: 480px; margin: 0 auto; padding: 0 0 40px; }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
    }

    .back-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }

    .page-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    /* ── Day pills ────────────────────────────────────────────────── */
    .day-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 12px;
    }
    .day-pills::-webkit-scrollbar { display: none; }

    .day-pill {
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .day-pill:hover { border-color: #303650; color: var(--text); }
    .day-pill.active { background: var(--surface-hover); border-color: #3b5bdb; color: var(--text); }

    /* ── Search controls ──────────────────────────────────────────── */
    .search-controls {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sort-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sort-label {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .sort-select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px 10px;
      cursor: pointer;
      outline: none;
    }
    .sort-select:focus { border-color: #3b5bdb; }
    .sort-select option:disabled { color: var(--text-dim); }
    .sort-select.compact { flex: 0 0 auto; }

    .loc-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .location-label {
      flex: 1;
      font-size: 13px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .loc-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      letter-spacing: 0.06em;
    }
    .loc-input:focus { border-color: #3b5bdb; }
    .loc-input::placeholder { color: var(--text-dim); font-family: 'DM Sans', sans-serif; letter-spacing: 0; }

    .update-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 7px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .update-btn:hover { border-color: #3b5bdb; color: var(--text); }
    .update-btn.highlighted {
      background: #3b5bdb;
      border-color: #3b5bdb;
      color: #fff;
      font-weight: 600;
    }
    .update-btn.highlighted:hover { background: #4c6ef5; border-color: #4c6ef5; }

    /* ── Scout blurb ─────────────────────────────────────────────── */
    .top-card { padding: 12px 16px 0; }

    .scout-blurb {
      margin: 10px 16px 0;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
      cursor: pointer;
    }
    .scout-blurb.loading { animation: pulse 1.4s ease-in-out infinite; }

    /* Aggregated product chip strip — sits beneath the Scout blurb,
       chips reflect ANY condition firing across the visible beaches'
       next 7 days. */
    .product-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin: 8px 16px 0;
    }
    .product-chip {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--advisory);
      text-decoration: none;
      white-space: nowrap;
    }
    .product-chip:hover { color: var(--blue); text-decoration: underline; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Beach cards (index.html style) ───────────────────────────── */
    .beach-list {
      padding: 12px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: grid;
      grid-template-columns: auto 1fr 20px;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .day-card:hover  { background: var(--surface-hover); border-color: #303650; }
    .day-card:active { transform: scale(0.99); }

    .day-card.status-go       { border-left: 3px solid var(--green); }
    .day-card.status-advisory { border-left: 3px solid var(--advisory); }
    .day-card.status-caution  { border-left: 3px solid var(--amber); }
    .day-card.status-no_go    { border-left: 3px solid var(--red); opacity: 0.7; }

    .day-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .rank-label {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      width: 20px;
      text-align: center;
    }

    .day-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .day-score-value {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      line-height: 1;
    }
    .day-score-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      line-height: 1;
    }
    .day-score.score-go       .day-score-value { color: var(--green); }
    .day-score.score-advisory .day-score-value { color: var(--advisory); }
    .day-score.score-caution  .day-score-value { color: var(--amber); }
    .day-score.score-no_go    .day-score-value { color: var(--red); opacity: 0.6; }
    .day-score.score-none     .day-score-value { color: var(--text-dim); }

    .weather-icon { font-size: 22px; line-height: 1; text-align: center; }

    .day-content { min-width: 0; }

    .beach-name {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .window-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      margin-bottom: 3px;
    }
    .window-sub.status-go       { color: var(--green); }
    .window-sub.status-advisory { color: var(--advisory); }
    .window-sub.status-caution  { color: var(--amber); }
    .window-sub.status-no_go    { color: var(--red); }
    .window-sub.status-none     { color: var(--text-dim); }
    .dist-link { cursor: pointer; color: var(--text) !important; font-weight: 600; }
    .dist-link:hover { opacity: 0.8; }
    /* Row wrapping the window label + distance link for non-NOW cards.
       Window label and 🚗 X.X mi sit next to each other with a small gap,
       matching the visual density of the chip row below. */
    .window-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .window-row .window-sub { margin-bottom: 0; }

    /* ── Directions modal ─────────────────────────────────────────── */
    .dir-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 299;
    }
    .dir-overlay.open { display: block; }

    .dir-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 16px 16px 36px;
      z-index: 300;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .dir-sheet.open { display: flex; }

    #dir-map {
      width: 100%;
      height: 260px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--bg);
    }

    .dir-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto -4px;
    }

    .dir-beach {
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .dir-meta {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    .dir-cancel {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      padding: 4px;
    }
    .dir-cancel:hover { color: var(--text); }

    .bacteria-warning {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
    }
    .bacteria-warning.risk-moderate { background: rgba(251,191,36,0.15); color: var(--amber); }
    .bacteria-warning.risk-high     { background: rgba(239,68,68,0.15);  color: var(--red);   }

    .chips {
      display: flex;
      flex-wrap: nowrap;
      gap: 2px;
      align-items: center;
      overflow: hidden;
    }

    .chip {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip-sep { color: var(--text-dim); }
    .chip.chip-go       { color: var(--green); }
    .chip.chip-advisory { color: var(--advisory); }
    .chip.chip-caution  { color: var(--amber); }
    .chip.chip-no_go    { color: var(--red); }

    .chevron {
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ── States ───────────────────────────────────────────────────── */
    .no-data { padding: 40px 20px; text-align: center; font-size: 13px; color: var(--text-dim); }

    .skeleton {
      height: 88px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-top">
      <a href="index.html" class="wordmark">
        <img src="src/avatar.png" class="scout-trigger" alt="Scout" onclick="event.preventDefault();toggleChat()" title="Ask Scout">
        Dog Beach Scout
      </a>
      <a href="index.html" class="back-link">← Back</a>
    </div>
    <div class="page-title">Find Your Beach</div>
    <div class="day-pills" id="day-pills"></div>
  </header>

  <div class="search-controls">
    <div class="sort-row">
      <span class="sort-label">Sort by</span>
      <select class="sort-select" id="sort-select" onchange="onSortChange(this.value)">
        <option value="conditions">Best Conditions</option>
        <option value="distance" id="opt-distance" disabled>Closest First</option>
        <option value="blend"    id="opt-blend"    disabled>Best Nearby (50/50)</option>
      </select>
      <span class="sort-label">Leash</span>
      <select class="sort-select compact" id="leash-select" onchange="onLeashFilterChange(this.value)">
        <option value="any">Any</option>
        <option value="off_leash">Off-leash</option>
        <option value="mixed">Mixed</option>
        <option value="on_leash">Required</option>
      </select>
    </div>
    <div class="loc-row" id="loc-row">
      <span class="location-label" id="location-label">📍 Detecting location…</span>
      <button class="update-btn" id="update-btn" onclick="onUpdateLocation()">Update</button>
    </div>
  </div>

  <div class="top-card" id="top-card"></div>
  <div class="scout-blurb loading" id="scout-blurb" onclick="toggleChat()">...</div>

  <!-- Aggregated product chip strip — populated by loadAggregatedChips()
       across all beaches × next 7 days. Hidden until at least one chip
       is rendered. -->
  <div class="product-chips" id="product-chips" style="display:none;"></div>

  <div class="beach-list" id="beach-list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

</div>

<div class="dir-overlay" id="dir-overlay" onclick="closeDirections()"></div>
<div class="dir-sheet" id="dir-sheet">
  <div class="dir-handle"></div>
  <div class="dir-beach" id="dir-beach"></div>
  <div class="dir-meta" id="dir-meta"></div>
  <div id="dir-map"></div>
  <button class="dir-cancel" onclick="closeDirections()">Close</button>
</div>

<script>
  const SUPABASE_URL = 'https://ehlzbwtrsxaaukurekau.supabase.co';
  const ANON_KEY     = 'sb_publishable_lAg7YdZ3w7S5fN8jgiExKQ_3-KtW3xk';

  // ── State ──────────────────────────────────────────────────────────
  let beachCache  = {};   // { [date]: BeachFindRow[] } — one entry per date pill
  let nowBeaches  = null; // [{ beach, day }] — cached after first NOW fetch
  let userLat     = null;
  let userLng     = null;
  let currentSort = 'conditions';
  let leashFilter = 'any';

  // Server-bounded nearest-N set. Client filters/sorts within this set.
  // GIST index on beaches.location makes the server query O(log N) at
  // any catalog size. 10 is enough to show top 5–7 after any sort mode.
  const NEAREST_LIMIT   = 10;
  const DISPLAY_LIMIT   = 7;

  // ── Day pills ──────────────────────────────────────────────────────
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d     = new Date(Date.now() + i * 86_400_000);
    const iso   = d.toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    const label = i === 0 ? 'TDY' : i === 1 ? 'TMW'
                : d.toLocaleDateString('en-US', { timeZone: 'America/Los_Angeles', weekday: 'short' }).toUpperCase();
    days.push({ iso, label });
  }

  let selectedDate = 'now';

  const pillsEl = document.getElementById('day-pills');

  // NOW pill first
  const nowBtn = document.createElement('button');
  nowBtn.className = 'day-pill active';
  nowBtn.textContent = 'NOW';
  nowBtn.onclick = () => {
    document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
    nowBtn.classList.add('active');
    selectedDate = 'now';
    sortAndRender();
  };
  pillsEl.appendChild(nowBtn);

  days.forEach(({ iso, label }) => {
    const btn = document.createElement('button');
    btn.className = 'day-pill' + (iso === selectedDate ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      selectedDate = iso;
      sortAndRender();
    };

    pillsEl.appendChild(btn);
  });

  // ── NOW mode ───────────────────────────────────────────────────────
  async function sortAndRenderNow() {
    if (!nowBeaches) {
      document.getElementById('top-card').innerHTML   = '<div class="skeleton"></div>';
      document.getElementById('beach-list').innerHTML =
        Array(4).fill('<div class="skeleton"></div>').join('');

      // Pull beach list via loadBeachesForDate so the spatial-bounded
      // nearest-N path is used consistently (was: raw REST fetching all
      // active beaches, which doesn't scale). distance_m is preserved
      // so NOW cards can render the car icon without waiting on the
      // client-side haversine path.
      const todayISO = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
      const beachList = (await loadBeachesForDate(todayISO))
        .map(b => ({ location_id: b.location_id, display_name: b.display_name, latitude: b.latitude, longitude: b.longitude, access_rule: b.access_rule, distance_m: b.distance_m }));

      const filteredBeachList = beachList.filter(b => matchesLeashFilter(b));

      const results = await Promise.all(
        filteredBeachList.map(b =>
          fetch(`${SUPABASE_URL}/functions/v1/get-beach-now?location_id=${b.location_id}`,
            { headers: { 'Authorization': `Bearer ${ANON_KEY}` } })
            .then(r => r.json())
            .then(d => ({ beach: b, day: nowToDay(d) }))
            .catch(() => ({ beach: b, day: null }))
        )
      );
      nowBeaches = results;
    }

    const cards = nowBeaches.map(({ beach, day }) => ({
      beach,
      day,
      distance: resolveDistanceMiles(beach),
    }));

    let sorted;
    if (currentSort === 'distance') {
      sorted = [...cards].sort((a, b) => (a.distance ?? 9999) - (b.distance ?? 9999));
    } else if (currentSort === 'blend') {
      const maxDist = Math.max(...cards.map(c => c.distance ?? 0), 1);
      sorted = [...cards].sort((a, b) => blendScore(b, maxDist) - blendScore(a, maxDist));
    } else {
      sorted = [...cards].sort((a, b) =>
        (b.day?.composite_score ?? 0) - (a.day?.composite_score ?? 0)
      );
    }

    renderSorted(sorted.slice(0, DISPLAY_LIMIT));
  }

  function nowToDay(d) {
    if (!d || d.error) return null;
    return {
      is_now:             true,
      location_id:        d.location_id,
      local_date:         d.local_date,
      day_status:         d.hour_status,
      best_window_label:  'Right now',
      best_window_status: d.hour_status,
      bacteria_risk:      'none',
      summary_weather:    wmoToSummaryWeather(d.weather_code, d.wind_speed),
      weather_code:       d.weather_code,
      composite_score:    d.hour_score,
      metric_statuses: {
        tide:  d.tide_status,
        wind:  d.wind_status,
        rain:  d.rain_status,
        crowd: d.crowd_status,
        temp:  d.temp_status,
        uv:    d.uv_status,
      },
      lowest_tide_height: d.tide_height,
      tide_direction:     d.tide_direction,
      avg_temp:           d.temp_air,
      avg_wind:           d.wind_speed,
      busyness_category:  d.busyness_category,
    };
  }

  function wmoToSummaryWeather(code, windSpeed) {
    if (windSpeed >= 20)           return 'windy';
    if (code === 0)                return 'sunny';
    if (code <= 2)                 return 'partly_cloudy';
    if (code === 3)                return 'cloudy';
    if (code >= 45 && code <= 48) return 'foggy';
    if (code >= 51)                return 'rainy';
    return 'partly_cloudy';
  }

  // ── Fetch beaches for a specific date (cached) ────────────────────
  // Passes lat/lng+limit when the user has a resolved location, so the
  // server returns only the nearest NEAREST_LIMIT beaches (GIST-indexed
  // KNN). Without coords, returns the full active set for score sorting.
  async function loadBeachesForDate(date) {
    if (beachCache[date]) return beachCache[date];
    const params = new URLSearchParams({ date });
    if (userLat !== null && userLng !== null) {
      params.set('lat',   String(userLat));
      params.set('lng',   String(userLng));
      params.set('limit', String(NEAREST_LIMIT));
    }
    const res  = await fetch(
      `${SUPABASE_URL}/functions/v1/get-beaches-find?${params}`,
      { headers: { 'Authorization': `Bearer ${ANON_KEY}` } }
    );
    const data = await res.json();
    if (Array.isArray(data.beaches)) beachCache[date] = data.beaches;
    return data.beaches ?? [];
  }

  // Convert flat get-beaches-find row into the day shape buildBeachCard expects
  function beachToDay(b) {
    if (!b.day_status || b.day_status === 'no_data') return null;
    return {
      day_status:         b.day_status,
      composite_score:    b.composite_score,
      best_window_label:  b.best_window_label,
      best_window_status: b.best_window_status,
      bacteria_risk:      b.bacteria_risk,
      summary_weather:    b.summary_weather,
      weather_code:       b.weather_code,
      lowest_tide_height: b.lowest_tide_height,
      avg_temp:           b.avg_temp,
      avg_wind:           b.avg_wind,
      busyness_category:  b.busyness_category,
      go_hours_count:     b.go_hours_count,
    };
  }

  // ── Sort and render ────────────────────────────────────────────────
  async function sortAndRender() {
    if (selectedDate === 'now') {
      await sortAndRenderNow();
      return;
    }

    // Fetch if not yet cached
    let beaches = beachCache[selectedDate];
    if (!beaches) {
      document.getElementById('top-card').innerHTML   = '<div class="skeleton"></div>';
      document.getElementById('beach-list').innerHTML =
        Array(4).fill('<div class="skeleton"></div>').join('');
      try {
        beaches = await loadBeachesForDate(selectedDate);
      } catch {
        document.getElementById('beach-list').innerHTML =
          '<div class="no-data">Failed to load beaches.</div>';
        return;
      }
    }

    // Build cards with server-or-client distance and leash filter
    const cards = beaches
      .filter(b => matchesLeashFilter(b))
      .map(b => ({
        beach:    b,
        day:      beachToDay(b),
        distance: resolveDistanceMiles(b),
      }));

    // Sort
    let sorted;
    if (currentSort === 'distance') {
      sorted = [...cards].sort((a, b) => (a.distance ?? 9999) - (b.distance ?? 9999));
    } else if (currentSort === 'blend') {
      const maxDist = Math.max(...cards.map(c => c.distance ?? 0), 1);
      sorted = [...cards].sort((a, b) => blendScore(b, maxDist) - blendScore(a, maxDist));
    } else {
      sorted = [...cards].sort((a, b) =>
        (b.day?.composite_score ?? 0) - (a.day?.composite_score ?? 0)
      );
    }

    renderSorted(sorted.slice(0, DISPLAY_LIMIT));
  }

  // ── Render sorted list: #1 above blurb, rest in list ──────────────
  function renderSorted(sorted) {
    if (!sorted.length) {
      document.getElementById('top-card').innerHTML   = '';
      document.getElementById('beach-list').innerHTML = '<div class="no-data">No data available.</div>';
      return;
    }

    const [first, ...rest] = sorted;
    document.getElementById('top-card').innerHTML   = buildBeachCard(first, 1);
    document.getElementById('beach-list').innerHTML = rest.map((c, i) => buildBeachCard(c, i + 2)).join('');
    loadScoutBlurb(sorted);
  }

  // ── Scout blurb ────────────────────────────────────────────────────
  const scoutCache = {};

  async function loadScoutBlurb(sorted) {
    const first    = sorted[0];
    const cacheKey = `${first.beach.location_id}_${selectedDate}_${currentSort}`;
    const el       = document.getElementById('scout-blurb');
    el.classList.add('loading');
    el.textContent = '...';

    if (scoutCache[cacheKey]) {
      el.textContent = scoutCache[cacheKey];
      el.classList.remove('loading');
      return;
    }

    // Full context with scores + distances for all sort modes
    const contextLines = sorted.slice(0, 5).map((c, i) => {
      const score   = c.day?.composite_score ?? '—';
      const status  = c.day?.day_status      ?? 'unknown';
      const distStr = c.distance != null ? `${c.distance.toFixed(1)} mi away` : 'distance unknown';
      return `${i + 1}. ${c.beach.display_name} (score: ${score}, status: ${status}, ${distStr})`;
    }).join('; ');

    const now       = new Date();
    const pacific   = new Intl.DateTimeFormat('en-US', { timeZone: 'America/Los_Angeles', hour: 'numeric', minute: '2-digit', hour12: true });
    const timeStr   = pacific.format(now);
    const isToday   = selectedDate === 'now' || selectedDate === new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    const dateLabel = isToday ? `right now (it is currently ${timeStr} Pacific — only consider remaining hours of today)` : `on ${selectedDate}`;
    let question;

    if (currentSort === 'conditions') {
      question = `Beach rankings by best conditions ${dateLabel}: ${contextLines}. In two sentences, explain why ${first.beach.display_name} is ranked #1 — what specific conditions (tide, temperature, wind, crowd, weather) make it the standout choice compared to the others?`;

    } else if (currentSort === 'distance') {
      // Check if a nearby beach has materially better conditions (15+ points higher score)
      const topScore   = first.day?.composite_score ?? 0;
      const betterNear = sorted.slice(1, 4).find(c =>
        c.day?.composite_score != null && (c.day.composite_score - topScore) >= 15
      );

      if (betterNear) {
        question = `Beaches sorted by distance from the user ${dateLabel}: ${contextLines}. The closest is ${first.beach.display_name} (${first.distance?.toFixed(1)} mi, score: ${topScore}). Note that ${betterNear.beach.display_name} is only ${betterNear.distance?.toFixed(1)} mi away but has a score of ${betterNear.day.composite_score}. In two sentences, acknowledge the closest beach but point out whether the short extra drive to ${betterNear.beach.display_name} is worth it given the conditions difference.`;
      } else {
        question = `Beaches sorted by distance from the user ${dateLabel}: ${contextLines}. The closest beach is ${first.beach.display_name} at ${first.distance?.toFixed(1)} mi with a score of ${topScore}. In two sentences, explain why ${first.beach.display_name} is a solid nearby choice — focus on its current conditions, not its ranking vs others.`;
      }

    } else {
      // Blend sort (50/50 conditions + proximity)
      question = `Beaches ranked by the best combination of conditions and proximity ${dateLabel}: ${contextLines}. In two sentences, explain why ${first.beach.display_name} hits the sweet spot — it's the best balance of being close and having good conditions compared to the other options.`;
    }

    try {
      const res  = await fetch(`${SUPABASE_URL}/functions/v1/beach-chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON_KEY}` },
        body:    JSON.stringify({ location_id: first.beach.location_id, question }),
      });
      const data  = await res.json();
      const text  = data.answer ?? '';
      scoutCache[cacheKey] = text;
      el.textContent = text;
    } catch {
      el.textContent = '';
    }
    el.classList.remove('loading');
  }

  // ── Build a beach card ─────────────────────────────────────────────
  function buildBeachCard({ beach, day, distance }, rank) {
    const status     = day?.day_status ?? 'no_go';
    const score      = day?.composite_score ?? null;
    const scoreClass = score !== null ? `score-${status}` : 'score-none';

    const scoreHtml = `
      <div class="day-score ${scoreClass}">
        <span class="day-score-value">${score !== null ? score : '—'}</span>
        <span class="day-score-label">SCORE</span>
      </div>`;

    const weatherIcon = getWeatherIcon(day?.summary_weather, day?.weather_code);

    const windowStatus = day?.best_window_status ?? status;
    const safeName = beach.display_name.replace(/'/g, "\\'");
    const distLink = distance !== null
      ? `<div class="window-sub status-none dist-link" onclick="event.stopPropagation();openDirections(${beach.latitude},${beach.longitude},'${safeName}',${distance})">🚗 ${distance.toFixed(1)} mi</div>`
      : '';

    let windowHtml;
    if (day?.is_now && distLink) {
      // NOW card with known location: distance replaces the "Right now" label.
      windowHtml = distLink;
    } else if (day?.is_now) {
      windowHtml = `<div class="window-sub status-${windowStatus}">Right now</div>`;
    } else {
      // Non-NOW: window label on the left, distance on the right, same row.
      const labelHtml = day?.best_window_label
        ? `<div class="window-sub status-${windowStatus}">${day.best_window_label}</div>`
        : `<div class="window-sub status-none">No good window</div>`;
      windowHtml = distLink
        ? `<div class="window-row">${labelHtml}${distLink}</div>`
        : labelHtml;
    }

    const bacteriaRisk = day?.bacteria_risk ?? 'none';
    const bacteriaHtml = bacteriaRisk === 'high'
      ? `<div class="bacteria-warning risk-high">⚠ 72h rain advisory</div>`
      : bacteriaRisk === 'moderate'
      ? `<div class="bacteria-warning risk-moderate">⚠ 72h rain advisory</div>`
      : '';

    const chips = buildChips(day, distance);

    return `
      <div class="day-card status-${status}" data-location-id="${beach.location_id}" onclick="window.location.href='detail.html?location=${beach.location_id}&date=${selectedDate}'">
        <div class="day-left">
          <div class="rank-label">#${rank}</div>
          ${scoreHtml}
          <div class="weather-icon">${weatherIcon}</div>
        </div>
        <div class="day-content">
          <div class="beach-name">${beach.display_name}</div>
          ${windowHtml}
          ${bacteriaHtml}
          <div class="chips">${chips}</div>
        </div>
        <div class="chevron">›</div>
      </div>`;
  }

  // ── Chips ──────────────────────────────────────────────────────────
  function chipClass(status) {
    if (!status || status === 'go') return 'chip-go';
    if (status === 'advisory')      return 'chip-advisory';
    if (status === 'caution')       return 'chip-caution';
    if (status === 'no_go')         return 'chip-no_go';
    return '';
  }

  function buildChips(day /* distance no longer a chip — rendered in window-row */) {
    const parts = [];
    const ms    = day?.metric_statuses ?? {};

    if (day?.lowest_tide_height != null) {
      const arrow = day.tide_direction === 'rising' ? '↑' : day.tide_direction === 'falling' ? '↓' : '';
      parts.push(`<span class="chip ${chipClass(ms.tide)}">🌊 ${parseFloat(day.lowest_tide_height).toFixed(1)}ft${arrow}</span>`);
    }
    if (day?.avg_temp != null) {
      parts.push(`<span class="chip ${chipClass(ms.temp)}">🌡 ${Math.round(day.avg_temp)}°</span>`);
    }
    if (day?.avg_wind != null) {
      parts.push(`<span class="chip ${chipClass(ms.wind)}">💨 ${Math.round(day.avg_wind)}mph</span>`);
    }
    if (day?.busyness_category) {
      const crowdLabel = {
        quiet:       '✌️ Quiet',
        moderate:    '⚖️ Mod',
        dog_party:   '🎉 Party',
        too_crowded: '🚫 Crowded',
      }[day.busyness_category] ?? day.busyness_category;
      parts.push(`<span class="chip ${chipClass(ms.crowd)}">${crowdLabel}</span>`);
    }

    return parts.join(`<span class="chip-sep">·</span>`);
  }

  // ── Weather icon ───────────────────────────────────────────────────
  function getWeatherIcon(summaryWeather, wmoCode) {
    const map = {
      sunny:         '☀️',
      partly_cloudy: '⛅',
      cloudy:        '☁️',
      foggy:         '🌫️',
      rainy:         '🌧️',
      windy:         '💨',
    };
    if (summaryWeather && map[summaryWeather]) return map[summaryWeather];
    if (wmoCode === 0)              return '☀️';
    if (wmoCode <= 2)               return '⛅';
    if (wmoCode === 3)              return '☁️';
    if (wmoCode <= 48)              return '🌫️';
    if (wmoCode <= 67)              return '🌧️';
    if (wmoCode <= 77)              return '🌨️';
    if (wmoCode <= 82)              return '🌧️';
    return '⛈️';
  }

  // ── Haversine distance (miles) ─────────────────────────────────────
  function haversine(lat1, lon1, lat2, lon2) {
    const R    = 3958.8;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a    = Math.sin(dLat / 2) ** 2 +
                 Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                 Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.asin(Math.sqrt(a));
  }

  // Prefer the server-provided distance_m (set by the find_beaches RPC
  // when lat/lng were passed). Falls back to client haversine using
  // userLat/userLng if the server didn't compute it. Returns miles or
  // null when neither source can produce a value.
  function resolveDistanceMiles(beach) {
    if (beach?.distance_m != null) return beach.distance_m / 1609.34;
    if (userLat !== null && userLng !== null && beach?.latitude != null && beach?.longitude != null) {
      return haversine(userLat, userLng, parseFloat(beach.latitude), parseFloat(beach.longitude));
    }
    return null;
  }

  // ── Blend score (higher = better) ─────────────────────────────────
  function blendScore({ day, distance }, maxDist) {
    const normScore = (day?.composite_score ?? 0) / 100;
    const normDist  = distance !== null ? 1 - (distance / maxDist) : 0.5;
    return (normScore + normDist) / 2;
  }

  // ── Location UI state ─────────────────────────────────────────────
  function showZipInput() {
    const row = document.getElementById('loc-row');
    row.innerHTML = `
      <input class="loc-input" id="loc-input" type="text" inputmode="numeric"
             maxlength="5" placeholder="Enter ZIP code"
             oninput="validateZipInput(this)" onkeydown="if(event.key==='Enter')onUpdateLocation()" />
      <button class="update-btn highlighted" id="update-btn" onclick="onUpdateLocation()">Update</button>`;
  }

  function showLocationLabel(text) {
    const row = document.getElementById('loc-row');
    row.innerHTML = `
      <span class="location-label" id="location-label">${text}</span>
      <button class="update-btn" id="update-btn" onclick="onUpdateLocation()">Update</button>`;
  }

  function validateZipInput(el) {
    el.value = el.value.replace(/\D/g, '').slice(0, 5);
  }

  // ── Update button handler ──────────────────────────────────────────
  function onUpdateLocation() {
    const input = document.getElementById('loc-input');
    if (input) {
      // ZIP mode — validate and geocode
      const zip = input.value.trim();
      if (!/^\d{5}$/.test(zip)) {
        input.style.borderColor = 'var(--red)';
        input.placeholder = '5 digits required';
        setTimeout(() => {
          input.style.borderColor = '';
          input.placeholder = 'Enter ZIP code';
        }, 1800);
        return;
      }
      geocodeZip(zip);
    } else {
      // Label mode — re-request geolocation
      requestGeolocation();
    }
  }

  // ── Geolocation ────────────────────────────────────────────────────
  function requestGeolocation() {
    showLocationLabel('📍 Detecting…');
    navigator.geolocation.getCurrentPosition(
      async pos => {
        setUserLocation(pos.coords.latitude, pos.coords.longitude);
        const name = await reverseGeocode(userLat, userLng);
        showLocationLabel('📍 ' + name);
        enableDistanceSorts();
        sortAndRender();
      },
      () => showZipInput()
    );
  }

  // ── ZIP geocoding ──────────────────────────────────────────────────
  async function geocodeZip(zip) {
    showLocationLabel('📍 Looking up ZIP…');
    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/search?postalcode=${zip}&countrycodes=us&format=json&limit=1`,
        { headers: { 'User-Agent': 'DogBeachScout/1.0' } }
      );
      const data = await res.json();
      if (!data[0]) { showZipInput(); return; }
      setUserLocation(parseFloat(data[0].lat), parseFloat(data[0].lon));
      showLocationLabel(`📍 ZIP ${zip}`);
      enableDistanceSorts();
      sortAndRender();
    } catch {
      showZipInput();
    }
  }

  // Updates the resolved user location and invalidates caches so the next
  // sortAndRender fetches a spatially-bounded result set instead of
  // reusing any location-less response already in the cache.
  function setUserLocation(lat, lng) {
    userLat = lat;
    userLng = lng;
    beachCache = {};
    nowBeaches = null;
    Object.keys(scoutCache).forEach(k => delete scoutCache[k]);
  }

  // ── Reverse geocode ────────────────────────────────────────────────
  async function reverseGeocode(lat, lng) {
    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
        { headers: { 'User-Agent': 'DogBeachScout/1.0' } }
      );
      const data = await res.json();
      const city  = data.address?.city || data.address?.town || data.address?.village || '';
      const state = (data.address?.state_code || '').replace(/^US-/, '');
      return city && state ? `${city}, ${state}` : 'Your Location';
    } catch {
      return 'Your Location';
    }
  }

  // ── Enable distance sort options ───────────────────────────────────
  function enableDistanceSorts() {
    document.getElementById('opt-distance').disabled = false;
    document.getElementById('opt-blend').disabled    = false;
  }

  function onSortChange(val) {
    currentSort = val;
    sortAndRender();
  }

  function onLeashFilterChange(val) {
    leashFilter = val;
    nowBeaches  = null; // reset NOW cache so filter applies
    sortAndRender();
  }

  function matchesLeashFilter(beach) {
    if (leashFilter === 'any') return true;
    return (beach.access_rule ?? 'off_leash') === leashFilter;
  }

  // ── Directions modal (Leaflet + OSRM) ────────────────────────────
  let dirMap       = null;
  let routeLayer   = null;
  let markersLayer = null;

  async function openDirections(lat, lng, beachName, distance) {
    document.getElementById('dir-beach').textContent = beachName;
    document.getElementById('dir-meta').textContent  = distance != null ? `${distance.toFixed(1)} mi away` : '';
    document.getElementById('dir-overlay').classList.add('open');
    document.getElementById('dir-sheet').classList.add('open');

    // Init map once
    if (!dirMap) {
      dirMap = L.map('dir-map', { zoomControl: true, attributionControl: false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
      }).addTo(dirMap);
    }

    // Clear previous layers
    if (routeLayer)   { dirMap.removeLayer(routeLayer);   routeLayer   = null; }
    if (markersLayer) { dirMap.removeLayer(markersLayer); markersLayer = null; }

    markersLayer = L.layerGroup().addTo(dirMap);

    // Beach marker
    const beachIcon = L.divIcon({
      html: '🏖️',
      className: '',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
    });
    L.marker([lat, lng], { icon: beachIcon }).addTo(markersLayer);

    if (userLat !== null) {
      // User marker
      const userIcon = L.divIcon({
        html: '📍',
        className: '',
        iconSize: [24, 24],
        iconAnchor: [12, 24],
      });
      L.marker([userLat, userLng], { icon: userIcon }).addTo(markersLayer);

      // Fetch route from OSRM
      try {
        const url = `https://router.project-osrm.org/route/v1/driving/${userLng},${userLat};${lng},${lat}?overview=full&geometries=geojson`;
        const res  = await fetch(url);
        const data = await res.json();
        if (data.routes?.[0]) {
          routeLayer = L.geoJSON(data.routes[0].geometry, {
            style: { color: '#4c6ef5', weight: 4, opacity: 0.85 },
          }).addTo(dirMap);
          dirMap.fitBounds(routeLayer.getBounds(), { padding: [24, 24] });
        } else {
          dirMap.setView([lat, lng], 13);
        }
      } catch {
        dirMap.setView([lat, lng], 13);
      }
    } else {
      dirMap.setView([lat, lng], 13);
    }

    // Leaflet needs a size invalidation after the sheet animates in
    setTimeout(() => dirMap.invalidateSize(), 50);
  }

  function closeDirections() {
    document.getElementById('dir-overlay').classList.remove('open');
    document.getElementById('dir-sheet').classList.remove('open');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDirections();
  });

  // ── Aggregated product chip strip ─────────────────────────────────
  // Single PostgREST fetch across all beaches × next 7 days. Any
  // condition firing anywhere in that window surfaces its product chip.
  // Bowl is the universal fallback so the strip is never empty.
  const CHIP_DEFS = {
    bowl:      { icon: '💧',  label: 'Collapsible Bowl', href: 'https://www.amazon.com/s?k=collapsible+dog+water+bowl' },
    ball:      { icon: '🦴',  label: 'Fetch Ball',       href: 'https://www.amazon.com/s?k=chuckit+ball+launcher' },
    towel:     { icon: '🛍️', label: 'Quick-Dry Towel',  href: 'https://www.amazon.com/s?k=microfiber+dog+towel' },
    sunscreen: { icon: '🌞',  label: 'Dog Sunscreen',    href: 'https://www.amazon.com/s?k=dog+sunscreen' },
    booties:   { icon: '👟',  label: 'Booties',          href: 'https://www.amazon.com/s?k=dog+boots+for+hot+sand' },
    leash:     { icon: '🐕',  label: 'Long Leash',       href: 'https://www.amazon.com/s?k=long+dog+training+leash' },
  };

  async function loadAggregatedChips() {
    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    const seventh = new Date(Date.now() + 6 * 86400000)
      .toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    let rows;
    try {
      const r = await fetch(
        `${SUPABASE_URL}/rest/v1/beach_day_recommendations` +
        `?select=avg_uv,avg_temp,lowest_tide_height,bacteria_risk,busyness_category` +
        `&local_date=gte.${today}&local_date=lte.${seventh}`,
        { headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` } });
      if (!r.ok) return;
      rows = await r.json();
    } catch { return; }
    if (!Array.isArray(rows) || rows.length === 0) return;

    // Day-level numeric thresholds mirror scoring_config severity bands
    // (no/caution/advisory): UV {11,8,6}, hot temp {95,85,80}, crowd
    // category, low tide {0, 0.5, 1.0}. Take max intensity across all
    // beach-days for each chip, filter > 0, sort desc, cap at 3.
    const num = (v) => v === null || v === undefined ? null : Number(v);
    const tier = (v, t) => v === null ? 0
                       : v >= t[0] ? 3 : v >= t[1] ? 2 : v >= t[2] ? 1 : 0;
    const tideTier  = (v) => v === null ? 0 : v <= 0 ? 3 : v <= 0.5 ? 2 : v <= 1.0 ? 1 : 0;
    const busyTier  = (c) => c === 'too_crowded' ? 3 : c === 'dog_party' ? 2 : 0;
    const swimSafe  = (d) => !d.bacteria_risk || d.bacteria_risk === 'none' || d.bacteria_risk === 'low';

    const maxBy = (fn) => rows.reduce((m, d) => Math.max(m, fn(d) ?? 0), 0);
    const uvInt    = maxBy(d => tier(num(d.avg_uv),   [11, 8, 6]));
    const tempInt  = maxBy(d => tier(num(d.avg_temp), [95, 85, 80]));
    const crowdInt = maxBy(d => busyTier(d.busyness_category));
    const tideInt  = maxBy(d => swimSafe(d) ? tideTier(num(d.lowest_tide_height)) : 0);

    const candidates = [
      { def: CHIP_DEFS.bowl,      intensity: 0.5 },
      { def: CHIP_DEFS.ball,      intensity: tideInt },
      { def: CHIP_DEFS.towel,     intensity: tideInt },
      { def: CHIP_DEFS.sunscreen, intensity: uvInt    },
      { def: CHIP_DEFS.booties,   intensity: tempInt  },
      { def: CHIP_DEFS.leash,     intensity: crowdInt },
    ];

    const chips = candidates
      .filter(c => c.intensity > 0)
      .sort((a, b) => b.intensity - a.intensity)
      .slice(0, 3);

    const el = document.getElementById('product-chips');
    el.innerHTML = chips.map(c =>
      `<a class="product-chip" href="${c.href}" target="_blank" rel="noopener noreferrer">[ ${c.icon} ${c.label} ]</a>`
    ).join('');
    el.style.display = '';
  }

  // ── Boot ───────────────────────────────────────────────────────────
  requestGeolocation();
  // Pre-fetch today so TDY pill is instant; warms beach list for NOW mode
  const _todayISO = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
  loadBeachesForDate(_todayISO);
  sortAndRenderNow();   // NOW is default — fetch immediately
  loadAggregatedChips();
</script>
<script>
  window.CHAT_CONFIG = {
    getLocationId: () => {
      const top = document.getElementById('top-card')?.querySelector('[data-location-id]');
      return top?.dataset.locationId ?? null;
    },
    placeholder: 'Which beach is best this weekend?',
  };
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="src/chat.js"></script>
</body>
</html>
