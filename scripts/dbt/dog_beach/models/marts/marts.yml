version: 2

models:
  - name: cpad_unit_for_beach
    description: |
      Per-beach canonical CPAD unit lookup. For each beach_locations row,
      finds the smallest containing CPAD polygon under the same overlay-demote
      → match_beach_name → "Beach"-in-name → smallest-area ranking that
      compute_dogs_verdict_core uses inline.

      Mirrors public.cpad_unit_for_beach but managed by dbt. Marts in the
      dbt schema; the public table is still maintained by the migration
      pipeline (and stays the source of truth for the cascade today).
    config:
      materialized: table
    columns:
      - name: origin_key
        tests: [unique, not_null]
      - name: beach_name
      - name: beach_county
      - name: unit_id

  - name: beach_with_verdict
    description: |
      The consumer-facing 805 — every beach_locations row joined to its
      current dog verdict + confidence + sources metadata. Most app code
      should query this rather than reaching into beach_verdicts directly.
      LEFT JOIN — beaches without a computed verdict still appear with
      nulls in the verdict columns.
    columns:
      - name: origin_key
        tests: [unique, not_null]
      - name: dogs_verdict
        tests:
          - accepted_values:
              values: ['yes', 'no']
              quote: true

  - name: truth_comparison
    description: |
      Compares our dogs_verdict against external truth-set sources
      (BringFido / CaliforniaBeaches / DogTrekker / websearch). Returns
      one row per matched external beach with a categorized outcome.
      Mirrors public.truth_comparison_v but expressed declaratively.
    columns:
      - name: origin_key
        tests: [unique, not_null]
      - name: outcome
        tests:
          - accepted_values:
              values: ['AGREE_yes','AGREE_no','LIKELY_OUR_ERROR_yes','LIKELY_OUR_ERROR_no','EXTERNALS_DISAGREE','us_unknown','mixed','no_external_coverage']
              quote: true
