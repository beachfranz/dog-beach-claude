version: 2
models:
- name: truth_comparison
  description: 'Compares our dogs_verdict against external truth-set sources

    (BringFido / CaliforniaBeaches / DogTrekker / websearch). Returns

    one row per matched external beach with a categorized outcome.

    Mirrors public.truth_comparison_v but expressed declaratively.

    '
  columns:
  - name: origin_key
    tests:
    - unique
    - not_null
  - name: outcome
    tests:
    - accepted_values:
        values:
        - AGREE_yes
        - AGREE_no
        - LIKELY_OUR_ERROR_yes
        - LIKELY_OUR_ERROR_no
        - EXTERNALS_DISAGREE
        - us_unknown
        - mixed
        - no_external_coverage
        quote: true
- name: consumer_beach_with_verdict
  description: Bridge between the consumer beaches table (Layer 6) and the catalog
    cascade (Layer 5). Spatial-joins each beaches row to nearest beach_locations within
    500m and surfaces the catalog verdict alongside curated consumer fields, with
    a parity column flagging agreements / disagreements / gaps.
  columns:
  - name: location_id
    tests:
    - unique
    - not_null
  - name: parity
    tests:
    - accepted_values:
        values:
        - agree_yes
        - agree_no
        - disagree
        - catalog_missing
        - catalog_null
        - consumer_missing
        - both_null
        quote: true
